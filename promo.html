<!-- Просмотр сетки интенсивов «Прознание + Coddy» -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интенсивы — для продвижения</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700;800&family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2A2A28;
    --ink-soft: #545452;
    --paper: #F7F3EA;
    --paper-warm: #FBF7EE;
    --paper-deep: #EDE7DA;
    --yellow: #F5DC8A;
    --yellow-deep: #DEC162;
    --orange-soft: #F3DEB7;
    --white: #FFFFFF;
    --shadow: rgba(42,42,40,0.06);

    --dir-it-bg: #C9E5F0;
    --dir-it-border: #92BFD0;
    --dir-soft-bg: #C9E4CB;
    --dir-soft-border: #91BD93;
    --dir-creative-bg: #F2E1A8;
    --dir-creative-border: #C8B16D;
    --dir-mno-bg: #E8C9D3;
    --dir-mno-border: #BD8B9C;
    --dir-mixed-bg: #DDD7C8;
    --dir-mixed-border: #ACA48F;
    --dir-default-bg: #DCEBE4;
    --dir-default-border: #95B6A4;

    --green: var(--dir-default-bg);
    --green-deep: var(--dir-default-border);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Geologica, system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    padding: 24px;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 5%, rgba(254,214,52,0.06) 0%, transparent 40%),
      radial-gradient(circle at 90% 95%, rgba(65,190,234,0.05) 0%, transparent 40%);
  }

  .header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 18px;
    margin-bottom: 24px;
    max-width: 1300px;
    margin-left: auto;
    margin-right: auto;
  }
  .eyebrow {
    font-family: Inter, sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(21,22,23,0.55);
    margin-bottom: 6px;
    font-weight: 500;
  }
  h1 {
    font-family: Geologica, sans-serif;
    font-weight: 600;
    font-size: 36px;
    line-height: 1;
  }
  h1 em {
    font-family: Caveat, cursive;
    font-style: normal;
    font-weight: 600;
    background: var(--yellow);
    padding: 0 8px;
    border-radius: 4px;
  }
  .subtitle {
    font-family: Inter, sans-serif;
    font-size: 13px;
    color: rgba(21,22,23,0.6);
    margin-top: 8px;
  }

  .container {
    max-width: 1300px;
    margin: 0 auto;
  }

  .locations-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }
  .location-name {
    background: var(--yellow);
    border: 1px solid var(--ink);
    border-radius: 4px;
    padding: 8px 14px;
    text-align: center;
    font-family: Geologica, sans-serif;
  }
  .location-name .name-text {
    font-weight: 600;
    font-size: 16px;
    line-height: 1.1;
  }
  .location-name .addr-text {
    display: block;
    font-family: Inter, sans-serif;
    font-weight: 400;
    font-size: 11px;
    font-style: italic;
    color: rgba(42,42,40,0.7);
    margin-top: 2px;
  }

  .schedule {
    background: var(--white);
    border: 1px solid var(--ink);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .month-header {
    background: var(--orange-soft);
    border-top: 2px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 8px 14px;
    font-family: Geologica, sans-serif;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .month-header:first-child { border-top: none; }

  .marker-header {
    background: var(--paper-deep);
    border-bottom: 1px solid var(--ink);
    padding: 4px 14px;
    height: 8px;
  }
  .marker-header.empty { display: none; }

  .week-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-bottom: 1px solid rgba(21,22,23,0.15);
  }
  .week-row:last-child { border-bottom: none; }

  .location-cell {
    border-right: 1px solid rgba(21,22,23,0.15);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 80px;
  }
  .location-cell:last-child { border-right: none; }
  .location-cell.empty { background: rgba(0,0,0,0.015); }
  .location-cell.empty.empty-row { background: transparent; min-height: 0; padding: 0; }

  .week-date {
    font-family: Geologica, sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    background: var(--green);
    padding: 3px 8px;
    border-radius: 3px;
    display: inline-block;
    width: fit-content;
  }
  .week-date.dim {
    background: transparent;
    color: rgba(21,22,23,0.3);
  }

  .multi-day-banner {
    background: var(--orange-soft);
    border: 1px solid #e0b056;
    padding: 4px 10px;
    border-radius: 3px;
    font-family: Inter, sans-serif;
    font-size: 12px;
    font-weight: 600;
  }

  .slot-line {
    display: grid;
    grid-template-columns: 84px 1fr 50px auto;
    grid-template-areas:
      "time theme cost btn"
      "time teacher cost btn";
    column-gap: 8px;
    row-gap: 1px;
    align-items: center;
    padding: 6px 8px;
    border-radius: 3px;
    background: var(--dir-default-bg);
    border: 1px solid var(--dir-default-border);
    font-family: Inter, sans-serif;
    font-size: 12px;
  }
  .slot-line.dir-it      { background: var(--dir-it-bg);       border-color: var(--dir-it-border); }
  .slot-line.dir-soft    { background: var(--dir-soft-bg);     border-color: var(--dir-soft-border); }
  .slot-line.dir-creative{ background: var(--dir-creative-bg); border-color: var(--dir-creative-border); }
  .slot-line.dir-mno     { background: var(--dir-mno-bg);      border-color: var(--dir-mno-border); }
  .slot-line.dir-mixed   { background: var(--dir-mixed-bg);    border-color: var(--dir-mixed-border); }
  .slot-line.empty { display: none; }

  /* Резервные слоты — затемняем (видит только промо) */
  .slot-line.is-reserve {
    opacity: 0.45;
    border-style: dashed;
  }
  .slot-line.is-reserve .program-btn {
    background: rgba(42,42,40,0.45);
  }
  .slot-line .time {
    grid-area: time;
    align-self: center;
    font-weight: 500;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .slot-line .theme {
    grid-area: theme;
    font-weight: 500;
    line-height: 1.25;
    /* Перенос по словам если очень длинная */
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .slot-line .teacher {
    grid-area: teacher;
    font-size: 10px;
    color: rgba(42,42,40,0.7);
    font-style: italic;
    line-height: 1.2;
  }
  .slot-line .cost-badge {
    grid-area: cost;
    align-self: center;
  }
  .slot-line .program-btn {
    grid-area: btn;
    align-self: center;
  }

  /* Бейдж «программа →» — контрастная кликабельная кнопка */
  .program-btn {
    background: var(--ink);
    color: var(--paper-warm);
    border: none;
    border-radius: 12px;
    padding: 4px 10px;
    font-family: Inter, sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    line-height: 1.2;
  }
  .program-btn:hover {
    background: var(--yellow-deep);
    color: var(--ink);
    transform: translateX(2px);
  }
  .program-btn .arrow {
    display: inline-block;
    margin-left: 2px;
    transition: transform 0.15s;
  }
  .program-btn:hover .arrow {
    transform: translateX(2px);
  }

  .slot-line .cost-badge {
    background: var(--white);
    border: 1px solid var(--ink);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
  }

  .empty-msg {
    color: rgba(21,22,23,0.35);
    font-style: italic;
    font-size: 12px;
  }

  /* Модалка */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(21,22,23,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--white);
    border: 1px solid var(--ink);
    border-radius: 8px;
    padding: 24px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .modal h2 {
    font-family: Geologica, sans-serif;
    font-size: 20px;
    margin-bottom: 8px;
  }
  .modal .meta {
    font-family: Inter, sans-serif;
    font-size: 12px;
    color: rgba(21,22,23,0.6);
    margin-bottom: 14px;
  }
  .modal p {
    font-family: Geologica, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: rgba(21,22,23,0.85);
  }
  .modal-close {
    background: var(--yellow);
    border: 1px solid var(--ink);
    padding: 8px 16px;
    border-radius: 4px;
    font-family: Inter, sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 16px;
  }
  .register-btn {
    display: block;
    margin-top: 14px;
    padding: 12px;
    background: var(--ink);
    color: var(--paper);
    text-align: center;
    border-radius: 6px;
    text-decoration: none;
    font-family: Inter, sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
    transition: opacity 0.15s;
  }
  .register-btn:hover { opacity: 0.85; }

  .footer {
    max-width: 1300px;
    margin: 24px auto 0;
    padding-top: 16px;
    border-top: 1px solid rgba(21,22,23,0.1);
    font-family: Inter, sans-serif;
    font-size: 11px;
    color: rgba(21,22,23,0.5);
    text-align: center;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: rgba(21,22,23,0.5);
  }
  .loader {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(21,22,23,0.2);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Мобильные вкладки локаций */
  .mobile-loc-tabs {
    display: none;
    gap: 6px;
    margin-bottom: 12px;
    background: var(--paper-deep);
    border-radius: 6px;
    padding: 4px;
    max-width: 1300px;
    margin-left: auto;
    margin-right: auto;
  }
  .mobile-loc-tab {
    flex: 1;
    padding: 7px 4px;
    background: transparent;
    border: none;
    border-radius: 4px;
    font-family: Geologica, sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(42,42,40,0.6);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-align: center;
    line-height: 1.2;
  }
  .mobile-loc-tab .addr-text {
    display: block;
    font-family: Inter, sans-serif;
    font-weight: 400;
    font-size: 10px;
    font-style: italic;
    margin-top: 1px;
    opacity: 0.85;
  }
  .mobile-loc-tab.active {
    background: var(--yellow);
    color: var(--ink);
    font-weight: 600;
  }

  @media (max-width: 900px) {
    body { padding: 12px; }
    .week-row { grid-template-columns: 1fr; }
    .location-cell { border-right: none; border-bottom: 1px solid rgba(21,22,23,0.1); }
    .locations-row { display: none; }
    .mobile-loc-tabs { display: flex; }
    .slot-line {
      grid-template-columns: 72px 1fr 40px;
      grid-template-areas:
        "time theme cost"
        "time teacher cost"
        "btn btn btn";
      column-gap: 8px;
      row-gap: 2px;
      padding: 6px 8px;
      font-size: 11px;
    }
    .slot-line .program-btn {
      justify-self: stretch;
      text-align: center;
      padding: 7px;
      margin-top: 4px;
    }

    body.mobile-loc-0 .location-cell[data-loc-idx="1"],
    body.mobile-loc-0 .location-cell[data-loc-idx="2"] { display: none; }
    body.mobile-loc-1 .location-cell[data-loc-idx="0"],
    body.mobile-loc-1 .location-cell[data-loc-idx="2"] { display: none; }
    body.mobile-loc-2 .location-cell[data-loc-idx="0"],
    body.mobile-loc-2 .location-cell[data-loc-idx="1"] { display: none; }

    body.mobile-loc-0 .location-cell[data-loc-idx="0"].empty-row,
    body.mobile-loc-1 .location-cell[data-loc-idx="1"].empty-row,
    body.mobile-loc-2 .location-cell[data-loc-idx="2"].empty-row { display: none; }
  }
</style>

<div class="container">
  <div class="header">
    <div class="eyebrow">Прознание + Coddy · интенсивы</div>
    <h1 id="h-title">—</h1>
    <div class="subtitle" id="h-subtitle"></div>
  </div>

  <div id="content">
    <div class="loading"><span class="loader"></span> Загружаю расписание…</div>
  </div>

  <div class="footer">
    <span id="footer-text">Прознание + Coddy</span>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// URL Apps Script — должен совпадать с index.html
const LIBRARY_URL = 'https://script.google.com/macros/s/AKfycbwjCR6mRw5b-M0ZoJrgZBdVn4LgK2ANxfsn8xogV308nKJ3EoSlEPBLhKrAcnZsv0s1/exec';
const PROJECT_TYPE = 'intensive';

let state = null;

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function getId() {
  const m = location.search.match(/[?&]id=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : null;
}

async function loadPublication(id) {
  const r = await fetch(LIBRARY_URL + '?action=getPublished&project=' + PROJECT_TYPE + '&id=' + encodeURIComponent(id) + '&_t=' + Date.now());
  const data = await r.json();
  if (!data.ok || !data.version) throw new Error(data.error || 'Публикация не найдена');
  const obj = JSON.parse(data.version.stateJson);
  // Сортируем слоты по времени, если ячейка не закреплена в ручном порядке
  if (obj && obj.weeks) {
    obj.weeks.forEach(w => {
      if (!w.locations) return;
      w.locations.forEach(loc => {
        if (loc && loc.slots && !loc.manualOrder) {
          loc.slots.sort((a, b) => parseSlotStartMinutes(a.time) - parseSlotStartMinutes(b.time));
        }
      });
    });
  }
  return obj;
}

function parseSlotStartMinutes(timeStr) {
  if (!timeStr) return 9999;
  const m = String(timeStr).match(/(\d{1,2})(?::(\d{2}))?/);
  if (!m) return 9999;
  const h = parseInt(m[1]) || 0;
  const min = parseInt(m[2]) || 0;
  return h * 60 + min;
}

function directionToClass(dir) {
  if (!dir) return '';
  const d = String(dir).toLowerCase().trim();
  if (d.includes('it') || d.includes('айт')) return 'dir-it';
  if (d.includes('soft') || d.includes('софт') || d.includes('навык')) return 'dir-soft';
  if (d.includes('твор') || d.includes('арт') || d.includes('art')) return 'dir-creative';
  if (d.includes('мно') || d.includes('наук') || d.includes('научн')) return 'dir-mno';
  if (d.includes('смеш') || d.includes('mixed')) return 'dir-mixed';
  return '';
}

// Считает количество дней по строке диапазона: "1 - 5 июня" → "5 дней", "29 - 3 июля" → "5 дней"
function calcDaysLabel(dateRange) {
  if (!dateRange) return '';
  // Извлекаем все числа подряд
  const nums = String(dateRange).match(/\d+/g);
  if (!nums || nums.length < 2) return '';
  const a = parseInt(nums[0]);
  const b = parseInt(nums[1]);
  if (isNaN(a) || isNaN(b)) return '';
  let days;
  if (b >= a) {
    // Простой случай — оба в одном месяце: «1-5 июня»
    days = b - a + 1;
  } else {
    // Переход между месяцами — «29 - 3 июля». Не зная стартового месяца, берём 30 дней
    // (среднее число дней — для июня и июля даёт правильный счёт, для большинства других тоже)
    days = (30 - a + 1) + b;
  }
  if (days < 1 || days > 14) return '';
  // Правильное склонение
  return days + ' ' + pluralizeDays(days);
}

function pluralizeDays(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'день';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'дня';
  return 'дней';
}

// На странице продвижения показываем утверждённые + резерв (резерв затемнённый).
// Старые слоты без поля status считаем утверждёнными.
function slotIsVisible(s) {
  if (!s) return false;
  if (!s.theme && !s.teacher) return false;
  const status = s.status || 'approved';
  return status === 'approved' || status === 'reserve';
}

async function init() {
  // Восстановим выбранную локацию для мобильной версии
  try {
    const saved = parseInt(localStorage.getItem('intensive_view_mobile_loc'));
    if (!isNaN(saved) && saved >= 0 && saved < 3) _mobileLocIdx = saved;
  } catch(e) {}

  const id = getId();
  if (!id) {
    document.getElementById('content').innerHTML = `
      <div class="loading">
        <p style="font-size:16px;margin-bottom:8px">Не указан id публикации.</p>
        <p style="font-size:13px;color:rgba(21,22,23,0.5)">Ссылка должна быть вида <code>view.html?id=...</code></p>
      </div>`;
    return;
  }

  try {
    state = await loadPublication(id);
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="loading">
        <p style="font-size:16px;margin-bottom:8px">⚠ Не удалось загрузить публикацию.</p>
        <p style="font-size:13px;color:rgba(21,22,23,0.5)">${escapeHtml(e.message)}</p>
      </div>`;
  }
}

function render() {
  document.getElementById('h-title').innerHTML = `<em>${escapeHtml(state.title || 'Интенсивы')}</em>`;
  let sub = '';
  if (state.ages) sub += state.ages;
  document.getElementById('h-subtitle').textContent = sub;

  let html = `<div class="locations-row">`;
  state.locations.forEach((loc, i) => {
    const addr = (state.locationAddresses && state.locationAddresses[i]) || '';
    html += `<div class="location-name">
      <span class="name-text">${escapeHtml(loc)}</span>
      ${addr ? `<span class="addr-text">${escapeHtml(addr)}</span>` : ''}
    </div>`;
  });
  html += `</div>`;

  // Мобильные вкладки
  html += `<div class="mobile-loc-tabs">`;
  state.locations.forEach((loc, i) => {
    const addr = (state.locationAddresses && state.locationAddresses[i]) || '';
    html += `<button class="mobile-loc-tab ${i === _mobileLocIdx ? 'active' : ''}"
      onclick="setMobileLoc(${i})">
      ${escapeHtml(loc)}
      ${addr ? `<span class="addr-text">${escapeHtml(addr)}</span>` : ''}
    </button>`;
  });
  html += `</div>`;

  html += `<div class="schedule">`;
  let lastMonth = null;
  let lastMarker = null;
  // Для определения видимости недели на мобиле — учитываем только выбранную локацию
  const isMobile = window.matchMedia && window.matchMedia('(max-width: 900px)').matches;
  const visibleLocIdxs = isMobile ? [_mobileLocIdx] : [0, 1, 2];

  state.weeks.forEach((w, wIdx) => {
    // Пропускаем неделю целиком, если ни в одной видимой локации нет тем
    const weekHasContent = visibleLocIdxs.some(li =>
      w.locations[li] && w.locations[li].slots && w.locations[li].slots.some(slotIsVisible)
    );
    if (!weekHasContent) return;

    if (w.month !== lastMonth) {
      html += `<div class="month-header">${escapeHtml(w.month || '—')}</div>`;
      lastMonth = w.month;
      lastMarker = null;
    }
    // Маркер показываем как тонкий серый разделитель без текста
    const showMarker = w.marker && w.marker !== lastMarker;
    if (showMarker) {
      html += `<div class="marker-header">&nbsp;</div>`;
      lastMarker = w.marker;
    }
    html += `<div class="week-row">`;
    w.locations.forEach((loc, lIdx) => {
      html += renderViewCell(w, wIdx, loc, lIdx);
    });
    html += `</div>`;
  });
  html += `</div>`;

  document.getElementById('content').innerHTML = html;
  applyMobileLocClass();
}

let _mobileLocIdx = 0;
function setMobileLoc(idx) {
  _mobileLocIdx = idx;
  try { localStorage.setItem('intensive_view_mobile_loc', String(idx)); } catch(e) {}
  if (state) render();
  else applyMobileLocClass();
}

function applyMobileLocClass() {
  document.body.classList.remove('mobile-loc-0','mobile-loc-1','mobile-loc-2');
  document.body.classList.add('mobile-loc-' + _mobileLocIdx);
}

window.addEventListener('resize', () => {
  if (state) {
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(() => render(), 200);
  }
});

function renderViewCell(week, wIdx, loc, lIdx) {
  const hasContent = loc.slots && loc.slots.some(slotIsVisible);
  // Если в ячейке нет ни одной заполненной темы — рендерим пустой div (он держит сетку из 3 колонок)
  if (!hasContent) {
    return `<div class="location-cell empty empty-row" data-loc-idx="${lIdx}"></div>`;
  }
  let html = `<div class="location-cell" data-loc-idx="${lIdx}">`;
  // Дата
  if (loc.dateRange) {
    html += `<div class="week-date">${escapeHtml(loc.dateRange)}</div>`;
  }
  // Многодневный банер: автоматически считаем дни из даты, если не задан вручную
  const dayLabel = loc.multiDayLabel || calcDaysLabel(loc.dateRange);
  if (dayLabel) {
    html += `<div class="multi-day-banner">${escapeHtml(dayLabel)}</div>`;
  }
  // Слоты
  if (hasContent) {
    loc.slots.forEach((s, sIdx) => {
      if (!slotIsVisible(s)) return;
      const cost = s.cost ? s.cost + 'р' : '';
      const dirClass = directionToClass(s.direction);
      const isReserve = (s.status || 'approved') === 'reserve';
      const reserveCls = isReserve ? 'is-reserve' : '';
      html += `
        <div class="slot-line ${dirClass} ${reserveCls}">
          <span class="time">${escapeHtml(s.time || '')}</span>
          <span class="theme">${escapeHtml(s.theme || '')}</span>
          <span class="teacher">${escapeHtml(s.teacher || '')}</span>
          <span class="cost-badge">${escapeHtml(cost) || '—'}</span>
          <button class="program-btn" onclick="showSlotDetails(${wIdx},${lIdx},${sIdx})">программа<span class="arrow">→</span></button>
        </div>
      `;
    });
  } else if (!loc.dateRange) {
    html += `<span class="empty-msg">—</span>`;
  }
  html += `</div>`;
  return html;
}

function showSlotDetails(wIdx, lIdx, sIdx) {
  const w = state.weeks[wIdx]; if (!w) return;
  const loc = w.locations[lIdx]; if (!loc) return;
  const s = loc.slots[sIdx]; if (!s) return;
  const locName = state.locations[lIdx];
  const locAddr = (state.locationAddresses && state.locationAddresses[lIdx]) || '';
  const locDet = (state.locationDetails && state.locationDetails[lIdx]) || {};
  const dirClass = directionToClass(s.direction);
  const cost = s.cost ? s.cost + 'р' : '—';
  const descHtml = (s.description && s.description.trim())
    ? escapeHtml(s.description).replace(/\n/g, '<br>')
    : '<em style="color:rgba(42,42,40,0.4)">Программа уточняется</em>';

  document.getElementById('modal-content').innerHTML = `
    <h2 style="margin-bottom:4px">${escapeHtml(s.theme || '—')}</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
      ${s.direction ? `<span class="dir-chip ${dirClass}" style="display:inline-block;padding:2px 8px;border-radius:10px;font-family:Inter,sans-serif;font-size:10px;font-weight:500">${escapeHtml(s.direction)}</span>` : ''}
      <span style="font-family:Inter,sans-serif;font-size:12px;color:rgba(42,42,40,0.6)">
        ${escapeHtml(locName)}${locAddr ? ' (' + escapeHtml(locAddr) + ')' : ''} · ${escapeHtml(loc.dateRange || '')} · ${escapeHtml(s.time || '')}
      </span>
    </div>

    <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-family:Inter,sans-serif;font-size:13px;margin-bottom:14px">
      <span style="color:rgba(42,42,40,0.55)">Педагог</span>
      <span>${escapeHtml(s.teacher || '—')}</span>
      ${locAddr ? `<span style="color:rgba(42,42,40,0.55)">Адрес</span><span>${escapeHtml(locAddr)}</span>` : ''}
      ${locDet.groupSize ? `<span style="color:rgba(42,42,40,0.55)">Группа</span><span>${escapeHtml(locDet.groupSize)}</span>` : ''}
      <span style="color:rgba(42,42,40,0.55)">Стоимость</span>
      <span style="font-weight:500">${escapeHtml(cost)}</span>
    </div>

    <div style="border-top:1px solid rgba(42,42,40,0.1);padding-top:12px">
      <div style="font-family:Inter,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:8px">Программа интенсива</div>
      <div style="font-family:Geologica,sans-serif;font-size:14px;line-height:1.55;color:var(--ink)">${descHtml}</div>
    </div>

    ${renderBringWithYouBlock(state.bringWithYou)}
    ${renderContactsBlock(locDet)}

    ${(s.crmFormUrl || s.crmGroupId) ? `
      <a href="${escapeHtml(s.crmFormUrl || ('https://proznanie4eee.s20.online/common/5/lead/create?gid=' + s.crmGroupId))}" target="_blank" class="register-btn">
        записаться на интенсив →
      </a>
    ` : ''}

    <button class="modal-close" onclick="closeModal()" style="margin-top:16px">закрыть</button>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}

function renderBringWithYouBlock(text) {
  if (!text || !String(text).trim()) return '';
  const html = escapeHtml(String(text)).replace(/\n/g, '<br>');
  return `
    <div style="border-top:1px solid rgba(42,42,40,0.1);padding-top:12px;margin-top:12px">
      <div style="font-family:Inter,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:6px">🎒 С собой</div>
      <div style="font-family:Geologica,sans-serif;font-size:13px;line-height:1.5;color:var(--ink)">${html}</div>
    </div>
  `;
}

function formatViberLink(v) {
  if (!v) return '';
  const trimmed = String(v).trim();
  if (trimmed.startsWith('viber:') || trimmed.startsWith('http')) return trimmed;
  const digits = trimmed.replace(/[^\d+]/g, '');
  return 'viber://chat?number=' + encodeURIComponent(digits);
}

function formatTelegramLink(t) {
  if (!t) return '';
  const trimmed = String(t).trim();
  if (trimmed.startsWith('http')) return trimmed;
  const username = trimmed.replace(/^@/, '').replace(/\s+/g, '');
  return 'https://t.me/' + username;
}

function renderContactsBlock(locDet) {
  if (!locDet) return '';
  const contacts = [
    { phone: locDet.phone1, viber: locDet.viber1, tg: locDet.telegram1 },
    { phone: locDet.phone2, viber: locDet.viber2, tg: locDet.telegram2 }
  ].filter(c => c.phone || c.viber || c.tg);
  if (!contacts.length) return '';
  const rows = contacts.map(c => {
    const phoneBtn = c.phone
      ? `<a href="tel:${escapeHtml(c.phone.replace(/[^\d+]/g, ''))}" style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--paper-deep);border-radius:6px;text-decoration:none;color:var(--ink);font-family:Inter,sans-serif;font-size:14px">
          <span style="font-size:16px">📞</span>
          <span style="font-weight:500">${escapeHtml(c.phone)}</span>
        </a>`
      : `<div style="flex:1"></div>`;
    const viberBtn = c.viber
      ? `<a href="${escapeHtml(formatViberLink(c.viber))}" title="Viber" style="display:flex;align-items:center;justify-content:center;padding:10px 14px;background:var(--paper-deep);border-radius:6px;text-decoration:none;font-size:18px">💬</a>`
      : '';
    const tgBtn = c.tg
      ? `<a href="${escapeHtml(formatTelegramLink(c.tg))}" target="_blank" title="Telegram" style="display:flex;align-items:center;justify-content:center;padding:10px 14px;background:var(--paper-deep);border-radius:6px;text-decoration:none;font-size:18px">✈</a>`
      : '';
    return `<div style="display:flex;gap:6px;margin-bottom:6px">${phoneBtn}${viberBtn}${tgBtn}</div>`;
  }).join('');
  return `
    <div style="border-top:1px solid rgba(42,42,40,0.1);padding-top:12px;margin-top:12px">
      <div style="font-family:Inter,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:8px">📞 Записаться</div>
      ${rows}
    </div>
  `;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
