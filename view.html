  .chip.dir-chip.dir-soft.active    { background: var(--dir-soft-bg);     color: var(--ink); border: 1.5px solid var(--dir-soft-border); font-weight: 500; }

<script>
// URL Apps Script — должен совпадать с index.html
const LIBRARY_URL = 'https://script.google.com/macros/s/AKfycbzbsD_4-SLX2sdd8rhhJAwWYA5UJtaRZ42uwaI1Q1BgD67tHvMitclU5wSnqkn94t2F/exec';
const PROJECT_TYPE = 'intensive';

let state = null;

// === Состояние фильтров ===
// locationIdx: -1 = все, 0..N-1 = конкретная
// directions: Set из ключей ('it','soft','creative','mno','mixed','other')
// '' (пустая строка) — направление не указано в данных, показываем по умолчанию вместе со всеми
const filters = {
  locationIdx: -1,
  directions: new Set() // пустой = все
};

// На мобиле: 'step1' (фильтр) или 'step2' (маршрут)
let mobileStep = 'step1';

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function getId() {
  const m = location.search.match(/[?&]id=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : null;
}

async function loadPublication(id) {
  const r = await fetch(LIBRARY_URL + '?action=getPublished&project=' + PROJECT_TYPE + '&id=' + encodeURIComponent(id) + '&_t=' + Date.now());
  const data = await r.json();
  if (!data.ok || !data.version) throw new Error(data.error || 'Публикация не найдена');
  const obj = JSON.parse(data.version.stateJson);
  if (obj && obj.weeks) {
    obj.weeks.forEach(w => {
      if (!w.locations) return;
      w.locations.forEach(loc => {
        if (loc && loc.slots && !loc.manualOrder) {
          loc.slots.sort((a, b) => parseSlotStartMinutes(a.time) - parseSlotStartMinutes(b.time));
        }
      });
    });
  }
  return obj;
}

function parseSlotStartMinutes(timeStr) {
  if (!timeStr) return 9999;
  const m = String(timeStr).match(/(\d{1,2})(?::(\d{2}))?/);
  if (!m) return 9999;
  const h = parseInt(m[1]) || 0;
  const min = parseInt(m[2]) || 0;
  return h * 60 + min;
}

function directionToClass(dir) {
  const k = directionToKey(dir);
  return k && k !== 'other' ? 'dir-' + k : '';
}
function directionToKey(dir) {
  if (!dir) return '';
  const d = String(dir).toLowerCase().trim();
  if (d.includes('it') || d.includes('айт')) return 'it';
  if (d.includes('soft') || d.includes('софт') || d.includes('навык')) return 'soft';
  if (d.includes('твор') || d.includes('арт') || d.includes('art')) return 'creative';
  if (d.includes('мно') || d.includes('наук') || d.includes('научн')) return 'mno';
  if (d.includes('смеш') || d.includes('mixed')) return 'mixed';
  return 'other';
}
function directionLabel(key) {
  return ({ it: 'IT', soft: 'soft', creative: 'творч', mno: 'МНО', mixed: 'смеш' })[key] || key;
}

function calcDaysLabel(dateRange) {
  if (!dateRange) return '';
  const nums = String(dateRange).match(/\d+/g);
  if (!nums || nums.length < 2) return '';
  const a = parseInt(nums[0]);
  const b = parseInt(nums[1]);
  if (isNaN(a) || isNaN(b)) return '';
  let days;
  if (b >= a) {
    days = b - a + 1;
  } else {
    days = (30 - a + 1) + b;
  }
  if (days < 1 || days > 14) return '';
  return days + ' ' + pluralizeDays(days);
}

function pluralizeDays(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'день';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'дня';
  return 'дней';
}
function pluralizeIntensive(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'интенсив';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'интенсива';
  return 'интенсивов';
}

function slotIsVisible(s) {
  if (!s) return false;
  if (!s.theme && !s.teacher) return false;
  const status = s.status || 'approved';
  return status === 'approved';
}

// Соберём все слоты в плоский массив для удобной фильтрации/группировки
function flattenSlots() {
  const out = [];
  if (!state || !state.weeks) return out;
  state.weeks.forEach((w, wIdx) => {
    if (!w.locations) return;
    w.locations.forEach((loc, lIdx) => {
      if (!loc || !loc.slots) return;
      loc.slots.forEach((s, sIdx) => {
        if (!slotIsVisible(s)) return;
        out.push({
          slot: s,
          wIdx, lIdx, sIdx,
          month: w.month || '',
          dateRange: loc.dateRange || '',
          multiDayLabel: loc.multiDayLabel || calcDaysLabel(loc.dateRange) || '',
          dirKey: directionToKey(s.direction)
        });
      });
    });
  });
  return out;
}

function passesFilter(item) {
  if (filters.locationIdx >= 0 && item.lIdx !== filters.locationIdx) return false;
  if (filters.directions.size > 0) {
    // Слот без направления — показываем только если фильтр не активен
    if (!item.dirKey || item.dirKey === 'other') return false;
    if (!filters.directions.has(item.dirKey)) return false;
  }
  return true;
}

// === Инициализация ===
async function init() {
  const id = getId();
  if (!id) {
    document.getElementById('content').innerHTML = `
      <div class="loading">
        <p style="font-size:16px;margin-bottom:8px">Не указан id публикации.</p>
        <p style="font-size:13px;color:rgba(21,22,23,0.5)">Ссылка должна быть вида <code>view.html?id=...</code></p>
      </div>`;
    return;
  }

  try {
    state = await loadPublication(id);
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="loading">
        <p style="font-size:16px;margin-bottom:8px">⚠ Не удалось загрузить публикацию.</p>
        <p style="font-size:13px;color:rgba(21,22,23,0.5)">${escapeHtml(e.message)}</p>
      </div>`;
  }
}

// === Главный рендер ===
function render() {
  document.getElementById('h-title').innerHTML = `<em>${escapeHtml(state.title || 'Маршрут лета')}</em>`;
  let sub = '';
  if (state.ages) sub += state.ages;
  document.getElementById('h-subtitle').textContent = sub;

  // Какие направления реально есть в данных
  const allItems = flattenSlots();
  const presentDirs = new Set();
  allItems.forEach(it => { if (it.dirKey && it.dirKey !== 'other') presentDirs.add(it.dirKey); });
  const dirOrder = ['it', 'soft', 'creative', 'mno', 'mixed'].filter(k => presentDirs.has(k));

  let html = '';

  // === Десктоп: фильтр-бар + timeline ===
  html += `<div class="desktop-only">`;
  html += renderFiltersBar(dirOrder);
  html += `<div id="desktop-timeline">${renderTimeline(allItems)}</div>`;
  html += `</div>`;

  // === Мобильный: 2 экрана ===
  html += `<div class="mobile-only">`;
  html += `<div class="mobile-step ${mobileStep === 'step1' ? 'active' : ''}" id="mobile-step1">${renderMobileFilter(allItems, dirOrder)}</div>`;
  html += `<div class="mobile-step ${mobileStep === 'step2' ? 'active' : ''}" id="mobile-step2">${renderMobileTimeline(allItems)}</div>`;
  html += `</div>`;

  document.getElementById('content').innerHTML = html;
}

// === Фильтр-бар (десктоп) ===
function renderFiltersBar(dirOrder) {
  let html = `<div class="filters-bar">`;

  // Локация
  html += `<div class="filter-group">`;
  html += `<span class="filter-label">локация</span>`;
  html += `<button class="chip ${filters.locationIdx === -1 ? 'active' : ''}" onclick="setLocFilter(-1)">все</button>`;
  state.locations.forEach((loc, i) => {
    html += `<button class="chip ${filters.locationIdx === i ? 'active' : ''}" onclick="setLocFilter(${i})">${escapeHtml(loc)}</button>`;
  });
  html += `</div>`;

  if (dirOrder.length) {
    html += `<div class="filter-divider"></div>`;
    html += `<div class="filter-group">`;
    html += `<span class="filter-label">направление</span>`;
    dirOrder.forEach(k => {
      const active = filters.directions.has(k);
      html += `<button class="chip dir-chip dir-${k} ${active ? 'active' : ''}" onclick="toggleDirFilter('${k}')">${directionLabel(k)}</button>`;
    });
    if (filters.directions.size > 0) {
      html += `<button class="chip" style="opacity:0.6;font-size:10px" onclick="clearDirFilter()">сбросить</button>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

// === Timeline (общая для десктопа и шага 2 мобильного) ===
function renderTimeline(allItems) {
  const items = allItems.filter(passesFilter);
  if (!items.length) {
    return `
      <div class="empty-state">
        <div class="big">Ничего не нашлось</div>
        <div class="small">Попробуй изменить фильтры — направление или локацию.</div>
      </div>`;
  }

  // Группируем по месяцам, внутри по weekIdx (сохраняем порядок данных)
  const byMonth = []; // [{month, weeks: [{wIdx, dateRange, days, items: []}]}]
  const monthMap = new Map();
  const weekMap = new Map(); // ключ: month + '||' + wIdx + '||' + dateRange (на случай разных дат в week)

  items.forEach(it => {
    if (!monthMap.has(it.month)) {
      const m = { month: it.month, weeks: [] };
      monthMap.set(it.month, m);
      byMonth.push(m);
    }
    const monthObj = monthMap.get(it.month);
    const wKey = it.month + '||' + it.wIdx + '||' + it.dateRange;
    if (!weekMap.has(wKey)) {
      const w = {
        wIdx: it.wIdx,
        dateRange: it.dateRange,
        days: it.multiDayLabel,
        items: []
      };
      weekMap.set(wKey, w);
      monthObj.weeks.push(w);
    }
    weekMap.get(wKey).items.push(it);
  });

  let html = `<div class="timeline-grid">`;
  byMonth.forEach(m => {
    const totalInMonth = m.weeks.reduce((acc, w) => acc + w.items.length, 0);
    html += `<div class="month-block">`;
    html += `<div class="month-label">${escapeHtml(m.month || '—')}<span class="month-count">${totalInMonth} ${pluralizeIntensive(totalInMonth)}</span></div>`;
    html += `<div class="month-stops">`;
    m.weeks.forEach((w, wIdxInMonth) => {
      html += `<div class="stop ${wIdxInMonth === 0 ? 'first-of-month' : ''}">`;
      html += `<div class="stop-head">`;
      html += `<div class="stop-date">${escapeHtml(w.dateRange || '—')}</div>`;
      if (w.days) html += `<div class="stop-days">${escapeHtml(w.days)}</div>`;
      html += `</div>`;
      w.items.forEach(it => {
        html += renderSlotCard(it);
      });
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

function renderSlotCard(item) {
  const s = item.slot;
  const dirCls = directionToClass(s.direction);
  const cost = s.cost ? s.cost + ' ₽' : '';
  const teacher = s.teacher || '';
  const time = s.time || '';
  const locName = state.locations[item.lIdx] || '';

  // Метаданные: время · педагог · локация (если фильтр по локации не активен)
  const metaParts = [];
  if (time) metaParts.push(escapeHtml(time));
  if (teacher) metaParts.push(escapeHtml(teacher));
  if (filters.locationIdx === -1 && locName) metaParts.push(escapeHtml(locName));
  const metaHtml = metaParts.join('<span class="dot">·</span>');

  return `
    <div class="slot-card ${dirCls}" onclick="showSlotDetails(${item.wIdx},${item.lIdx},${item.sIdx})">
      <div class="slot-info">
        <div class="slot-theme">${escapeHtml(s.theme || '—')}</div>
        <div class="slot-meta">${metaHtml}</div>
      </div>
      <div class="slot-side">
        ${cost ? `<div class="slot-cost">${escapeHtml(cost)}</div>` : ''}
        <span class="slot-link">программа →</span>
      </div>
    </div>
  `;
}

// === Мобильный: Шаг 1 (фильтр) ===
function renderMobileFilter(allItems, dirOrder) {
  const matchingCount = allItems.filter(passesFilter).length;
  const filtersActive = filters.locationIdx >= 0 || filters.directions.size > 0;

  let html = '';
  html += `<div class="filter-screen-h">кому ищем интенсив?</div>`;
  html += `<div class="filter-screen-sub">соберём маршрут под ребёнка</div>`;

  // Локация — стопка
  html += `<div class="filter-section">`;
  html += `<div class="filter-section-label">локация</div>`;
  html += `<div class="loc-stack">`;
  html += `<button class="loc-stack-item ${filters.locationIdx === -1 ? 'active' : ''}" onclick="setLocFilter(-1)">все локации</button>`;
  state.locations.forEach((loc, i) => {
    const addr = (state.locationAddresses && state.locationAddresses[i]) || '';
    html += `<button class="loc-stack-item ${filters.locationIdx === i ? 'active' : ''}" onclick="setLocFilter(${i})">
      <span>${escapeHtml(loc)}</span>
      ${addr ? `<span class="addr-text">${escapeHtml(addr)}</span>` : ''}
    </button>`;
  });
  html += `</div></div>`;

  // Направление — chips
  if (dirOrder.length) {
    html += `<div class="filter-section">`;
    html += `<div class="filter-section-label">направление</div>`;
    html += `<div class="dir-chips-wrap">`;
    dirOrder.forEach(k => {
      const active = filters.directions.has(k);
      html += `<button class="chip dir-chip dir-${k} ${active ? 'active' : ''}" onclick="toggleDirFilter('${k}')">
        ${directionLabel(k)}${active ? ' ✓' : ''}
      </button>`;
    });
    html += `</div></div>`;
  }

  // Кнопка показать
  const btnLabel = filtersActive
    ? `показать ${matchingCount} ${pluralizeIntensive(matchingCount)} →`
    : `показать всё лето · ${matchingCount} ${pluralizeIntensive(matchingCount)} →`;
  html += `<button class="show-btn" onclick="goToStep2()" ${matchingCount === 0 ? 'disabled' : ''}>${btnLabel}</button>`;

  if (filtersActive) {
    html += `<button class="show-all-link" onclick="resetFiltersAndGo()">или показать всё лето</button>`;
  }

  return html;
}

// === Мобильный: Шаг 2 (timeline) ===
function renderMobileTimeline(allItems) {
  const filtered = allItems.filter(passesFilter);
  const filtersActive = filters.locationIdx >= 0 || filters.directions.size > 0;

  // Сборка summary
  const summaryParts = [];
  if (filters.locationIdx >= 0) summaryParts.push(state.locations[filters.locationIdx]);
  if (filters.directions.size > 0) {
    summaryParts.push(Array.from(filters.directions).map(directionLabel).join(', '));
  }
  if (summaryParts.length === 0) summaryParts.push('всё лето');

  let html = '';
  html += `<div class="step-2-head">`;
  html += `<button class="back-link" onclick="goToStep1()"><span class="arrow">←</span><span>${filtersActive ? 'изменить' : 'фильтр'}</span></button>`;
  html += `<div class="step-2-title">${filtered.length} ${pluralizeIntensive(filtered.length)}</div>`;
  html += `<div class="step-2-summary">${escapeHtml(summaryParts.join(' · '))}</div>`;
  html += `</div>`;

  html += renderTimeline(allItems);
  return html;
}

// === Действия фильтров ===
function setLocFilter(idx) {
  filters.locationIdx = idx;
  rerenderFilteredAreas();
}
function toggleDirFilter(key) {
  if (filters.directions.has(key)) filters.directions.delete(key);
  else filters.directions.add(key);
  rerenderFilteredAreas();
}
function clearDirFilter() {
  filters.directions.clear();
  rerenderFilteredAreas();
}
function goToStep1() {
  mobileStep = 'step1';
  render();
  window.scrollTo(0, 0);
}
function goToStep2() {
  mobileStep = 'step2';
  render();
  window.scrollTo(0, 0);
}
function resetFiltersAndGo() {
  filters.locationIdx = -1;
  filters.directions.clear();
  goToStep2();
}

// Перерисовка только фильтр-бара и timeline без полного render() —
// чтобы не дёргать прокрутку и сохранить плавность
function rerenderFilteredAreas() {
  // На мобиле в step1 — перерисовываем весь шаг (счётчик + чипы)
  const isMobile = window.matchMedia && window.matchMedia('(max-width: 900px)').matches;
  if (isMobile && mobileStep === 'step1') {
    render();
    return;
  }
  // Иначе перерисовываем целиком — счётчик в кнопке надо обновить
  render();
}

// === Модалка (как раньше) ===
function showSlotDetails(wIdx, lIdx, sIdx) {
  const w = state.weeks[wIdx]; if (!w) return;
  const loc = w.locations[lIdx]; if (!loc) return;
  const s = loc.slots[sIdx]; if (!s) return;
  const locName = state.locations[lIdx];
  const locAddr = (state.locationAddresses && state.locationAddresses[lIdx]) || '';
  const locDet = (state.locationDetails && state.locationDetails[lIdx]) || {};
  const dirClass = directionToClass(s.direction);
  const cost = s.cost ? s.cost + ' ₽' : '—';
  const desc = (s.descriptionPublic && s.descriptionPublic.trim()) || s.description || '';
  const descHtml = desc
    ? escapeHtml(desc).replace(/\n/g, '<br>')
    : '<em style="color:rgba(42,42,40,0.4)">Программа уточняется</em>';
  const ageLabel = s.age || state.ages || '';

  document.getElementById('modal-content').innerHTML = `
    <h2>${escapeHtml(s.theme || '—')}</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
      ${s.direction ? `<span class="chip dir-chip ${dirClass} active" style="cursor:default;font-weight:500;font-size:10px">${escapeHtml(s.direction)}</span>` : ''}
      <span style="font-family:Inter,sans-serif;font-size:12px;color:rgba(42,42,40,0.6)">
        ${escapeHtml(locName)}${locAddr ? ' (' + escapeHtml(locAddr) + ')' : ''} · ${escapeHtml(loc.dateRange || '')} · ${escapeHtml(s.time || '')}
      </span>
    </div>

    <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-family:Inter,sans-serif;font-size:13px;margin-bottom:14px">
      <span style="color:rgba(42,42,40,0.55)">Педагог</span>
      <span>${escapeHtml(s.teacher || '—')}</span>
      ${locAddr ? `<span style="color:rgba(42,42,40,0.55)">Адрес</span><span>${escapeHtml(locAddr)}</span>` : ''}
      ${ageLabel ? `<span style="color:rgba(42,42,40,0.55)">Возраст</span><span>${escapeHtml(ageLabel)}</span>` : ''}
      ${locDet.groupSize ? `<span style="color:rgba(42,42,40,0.55)">Кол-во детей в группе</span><span>${escapeHtml(locDet.groupSize)}</span>` : ''}
      <span style="color:rgba(42,42,40,0.55)">Стоимость</span>
      <span style="font-weight:500">${escapeHtml(cost)}</span>
    </div>

    <div style="border-top:1px solid rgba(42,42,40,0.1);padding-top:12px">
      <div style="font-family:Inter,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:8px">Описание для родителей</div>
      <div style="font-family:Geologica,sans-serif;font-size:14px;line-height:1.55;color:var(--ink)">${descHtml}</div>
    </div>

    ${renderBringWithYouBlock(state.bringWithYou)}
    ${renderContactsBlock(locDet)}

    ${(s.crmFormUrl || s.crmGroupId) ? `
      <a href="${escapeHtml(s.crmFormUrl || ('https://proznanie4eee.s20.online/common/5/lead/create?gid=' + s.crmGroupId))}" target="_blank" class="register-btn">
        записаться на интенсив →
      </a>
    ` : ''}

    <button class="modal-close" onclick="closeModal()" style="margin-top:16px">закрыть</button>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}

function renderBringWithYouBlock(text) {
  if (!text || !String(text).trim()) return '';
  const html = escapeHtml(String(text)).replace(/\n/g, '<br>');
  return `
    <div style="border-top:1px solid rgba(42,42,40,0.1);padding-top:12px;margin-top:12px">
      <div style="font-family:Inter,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:6px">🎒 С собой</div>
      <div style="font-family:Geologica,sans-serif;font-size:13px;line-height:1.5;color:var(--ink)">${html}</div>
    </div>
  `;
}

function formatViberLink(v) {
  if (!v) return '';
  const trimmed = String(v).trim();
  if (trimmed.startsWith('viber:') || trimmed.startsWith('http')) return trimmed;
  const digits = trimmed.replace(/[^\d+]/g, '');
  return 'viber://chat?number=' + encodeURIComponent(digits);
}

function formatTelegramLink(t) {
  if (!t) return '';
  const trimmed = String(t).trim();
  if (trimmed.startsWith('http')) return trimmed;
  const username = trimmed.replace(/^@/, '').replace(/\s+/g, '');
  return 'https://t.me/' + username;
}

function renderContactsBlock(locDet) {
  if (!locDet) return '';
  const contacts = [
    { phone: locDet.phone1, viber: locDet.viber1, tg: locDet.telegram1 },
    { phone: locDet.phone2, viber: locDet.viber2, tg: locDet.telegram2 }
  ].filter(c => c.phone || c.viber || c.tg);
  if (!contacts.length) return '';
  const rows = contacts.map(c => {
    const phoneBtn = c.phone
      ? `<a href="tel:${escapeHtml(c.phone.replace(/[^\d+]/g, ''))}" style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--paper-deep);border-radius:6px;text-decoration:none;color:var(--ink);font-family:Inter,sans-serif;font-size:14px">
          <span style="font-size:16px">📞</span>
          <span style="font-weight:500">${escapeHtml(c.phone)}</span>
        </a>`
      : `<div style="flex:1"></div>`;
    const viberBtn = c.viber
      ? `<a href="${escapeHtml(formatViberLink(c.viber))}" title="Viber" style="display:flex;align-items:center;justify-content:center;padding:10px 14px;background:var(--paper-deep);border-radius:6px;text-decoration:none;font-size:18px">💬</a>`
      : '';
    const tgBtn = c.tg
      ? `<a href="${escapeHtml(formatTelegramLink(c.tg))}" target="_blank" title="Telegram" style="display:flex;align-items:center;justify-content:center;padding:10px 14px;background:var(--paper-deep);border-radius:6px;text-decoration:none;font-size:18px">✈</a>`
      : '';
    return `<div style="display:flex;gap:6px;margin-bottom:6px">${phoneBtn}${viberBtn}${tgBtn}</div>`;
  }).join('');
  return `
    <div style="border-top:1px solid rgba(42,42,40,0.1);padding-top:12px;margin-top:12px">
      <div style="font-family:Inter,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:8px">📞 Записаться</div>
      ${rows}
    </div>
  `;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

window.addEventListener('resize', () => {
  if (state) {
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(() => render(), 200);
  }
});

init();
</script>
