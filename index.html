    openModal(`
      <h2>⚠ В филиале «Интенсивы» нет педагогов</h2>
      <p>Чтобы создавать интенсивы через Альфа CRM, нужно сначала привязать педагогов к филиалу 5.</p>
      <p style="font-family:Inter,sans-serif;font-size:12px;color:rgba(42,42,40,0.6)">
        В Альфе откройте карточку педагога → в поле «Филиалы» добавьте «Интенсивы» (рядом с уже стоящими филиалами).
        После этого вернитесь сюда и нажмите кнопку ещё раз.
      </p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">закрыть</button>
        <button class="btn btn-ghost" onclick="loadCrmReference(true).then(()=>proceedCrmForm('${weekId}',${lIdx},${sIdx},'${mode}',${existingGroupId || 'null'}))">🔄 проверить ещё раз</button>
      </div>
    `);
    return;
  }
  if (!ref.locations || !ref.locations.length) {
    openModal(`
      <h2>⚠ В филиале «Интенсивы» нет локаций</h2>
      <p>Нужно создать в Альфе локации для филиала 5 (адреса проведения интенсивов).</p>
      <p style="font-family:Inter,sans-serif;font-size:12px;color:rgba(42,42,40,0.6)">
        В Альфе: Настройки → Локации → Создать. Укажите филиал «Интенсивы».
      </p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">закрыть</button>
        <button class="btn btn-ghost" onclick="loadCrmReference(true).then(()=>proceedCrmForm('${weekId}',${lIdx},${sIdx},'${mode}',${existingGroupId || 'null'}))">🔄 проверить ещё раз</button>
      </div>
    `);
    return;
  }

  // Опциональные поля — показываем только если в Альфе они настроены
  const hasStatus = ref.statuses && ref.statuses.length > 0;
  const hasLevel = ref.levels && ref.levels.length > 0;

  openModal(`
    <h2>📤 ${mode === 'update' ? 'Обновить' : 'Создать'} в Альфа CRM</h2>
    <p style="font-family:Inter,sans-serif;font-size:12px;color:rgba(42,42,40,0.6);margin-bottom:14px">
      <b>${escapeHtml(slot.theme)}</b><br>
      ${escapeHtml(state.locations[lIdx])} · ${escapeHtml(w.locations[lIdx].dateRange)} · ${escapeHtml(slot.time)}

    <label>Педагог <span style="color:rgba(42,42,40,0.5)">(основной)</span></label>
    <select id="crm-teacher">${opts(ref.teachers, teacherGuess)}</select>

}

async function submitCrmForm(weekId, lIdx, sIdx, mode, existingGroupId) {
  const w = findWeek(weekId); if (!w) return;
  const slot = w.locations[lIdx].slots[sIdx];

  const teacherId = document.getElementById('crm-teacher').value;
  const subjectId = document.getElementById('crm-subject').value;
  const locationId = document.getElementById('crm-location').value;
  const roomId = document.getElementById('crm-room').value;
  const lessonTypeId = document.getElementById('crm-lesson-type').value;
  const statusId = document.getElementById('crm-status').value;
  const levelId = document.getElementById('crm-level').value;
  const topic = document.getElementById('crm-topic').value.trim() || slot.theme;

  if (!teacherId) { toast('Выберите педагога', 'error'); return; }
  if (!subjectId) { toast('Выберите предмет', 'error'); return; }
  if (!locationId) { toast('Выберите локацию в Альфе', 'error'); return; }
  if (!lessonTypeId) { toast('Выберите тип урока', 'error'); return; }

  const dates = parseSlotDateRange(w.locations[lIdx].dateRange, state.title);
  const time = parseTimeForCrm(slot.time);

  const firstDate = dates[0];
  const lastDate = dates[dates.length-1];
  const isoDate = (d) => d.toISOString().slice(0, 10);

  const groupPayload = {
    name: slot.theme,
    note: 'Автоматически создано через Прознание+Coddy. Тема: ' + slot.theme +
          (slot.description ? '\n\n' + slot.description : ''),
    teacher_id: parseInt(teacherId),
    branch_id: ALFA_BRANCH_ID,
    b_date_from: isoDate(firstDate),
    b_date_to: isoDate(firstDate),
    e_date_from: isoDate(lastDate),
    e_date_to: isoDate(lastDate)
  };
  if (statusId) groupPayload.status_id = parseInt(statusId);
  if (levelId) groupPayload.level_id = parseInt(levelId);

  const lessons = dates.map(d => {
    const payload = {
      date_from: isoDate(d),
      date_to: isoDate(d),
      time_from: time.from,
      time_to: time.to,
      duration: time.duration,
      teacher_id: parseInt(teacherId),
      subject_id: parseInt(subjectId),
      lesson_type_id: parseInt(lessonTypeId),
      location_ids: [parseInt(locationId)],
      topic: topic
    };
    if (roomId) payload.room_ids = [parseInt(roomId)];
    return payload;
  });

  openModal(`<h2><span class="loader"></span> Отправляю в Альфа CRM…</h2><p>Создаём группу и ${lessons.length} ${pluralizeDays(lessons.length).replace('день','урок').replace('дня','урока').replace('дней','уроков')}…</p>`);

  try {
    const r = await fetch(LIBRARY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'crmDispatchSlot',
        branchId: ALFA_BRANCH_ID,
        mode: mode,
        groupId: existingGroupId,
        group: groupPayload,
        lessons: lessons
      })
    });
    const data = await r.json();

    if (data.ok || (data.groupId && data.lessonsCreated === data.totalLessons)) {
      pushUndo();
      slot.crmGroupId = data.groupId;
      slot.crmSyncedAt = new Date().toISOString();
      saveLocal();
      closeModal();
      render();
      toast(`✓ В Альфе: группа #${data.groupId}, уроков создано ${data.lessonsCreated}/${data.totalLessons}`, 'success');
    } else if (data.groupId) {
      // Группа создана, но часть уроков с ошибкой
      pushUndo();
      slot.crmGroupId = data.groupId;
      saveLocal();
      closeModal();
      render();
      toast(`⚠ Группа #${data.groupId} создана, но ${(data.totalLessons-data.lessonsCreated)} уроков не создалось. См. консоль.`, 'error');
      console.warn('CRM lesson errors:', data.errors);
    } else {
      closeModal();
      toast('Ошибка: ' + (data.error || JSON.stringify(data)), 'error');
    }
  } catch(e) {
    closeModal();
    toast('Сетевая ошибка: ' + e.message, 'error');
  }
}

// Парсинг даты вида "1 - 5 июня" → массив объектов Date.
// Год определяется из заголовка публикации (state.title), типа «Интенсивы лето 2026».
function parseSlotDateRange(dateRange, title) {
  if (!dateRange) return [];
  // Извлекаем год из title или текущий
  let year = (new Date()).getFullYear();
  const ym = String(title || '').match(/(20\d{2})/);
  if (ym) year = parseInt(ym[1]);

  // Извлекаем 2 числа и месяц
  const m = String(dateRange).match(/(\d+)\s*[-–]\s*(\d+)\s+([а-яё]+)/i);
  if (!m) return [];
  const a = parseInt(m[1]);
  const b = parseInt(m[2]);
  const monthRu = m[3].toLowerCase();
  const months = {
    'январ': 0, 'феврал': 1, 'март': 2, 'апрел': 3, 'мая': 4, 'мае': 4, 'май': 4,
    'июн': 5, 'июл': 6, 'август': 7, 'сентябр': 8, 'октябр': 9, 'ноябр': 10, 'декабр': 11
  };
  let month = -1;
  Object.keys(months).forEach(k => { if (monthRu.startsWith(k)) month = months[k]; });
  if (month < 0) return [];

  const dates = [];
  if (b >= a) {
    for (let d = a; d <= b; d++) dates.push(new Date(year, month, d));
  } else {
    // переход через месяц: a-30 текущего, 1-b следующего
    const lastDay = new Date(year, month+1, 0).getDate();
    for (let d = a; d <= lastDay; d++) dates.push(new Date(year, month, d));
    for (let d = 1; d <= b; d++) dates.push(new Date(year, month+1, d));
  }
  return dates;
}

// "11:00-13:00" / "11-13" / "10:30-13" → { from: "11:00", to: "13:00", duration: 120 }
function parseTimeForCrm(timeStr) {
  if (!timeStr) return { from: '11:00', to: '13:00', duration: 120 };
  const m = String(timeStr).match(/(\d{1,2})(?::(\d{2}))?\s*[-–]\s*(\d{1,2})(?::(\d{2}))?/);
  if (!m) return { from: '11:00', to: '13:00', duration: 120 };
  const h1 = parseInt(m[1]) || 0, m1 = parseInt(m[2]) || 0;
  const h2 = parseInt(m[3]) || 0, m2 = parseInt(m[4]) || 0;
  const pad = (n) => String(n).padStart(2, '0');
  const from = pad(h1) + ':' + pad(m1);
  const to = pad(h2) + ':' + pad(m2);
  const duration = (h2*60+m2) - (h1*60+m1);
  return { from: from, to: to, duration: duration > 0 ? duration : 120 };
}

function formatDateForRu(d) {
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return d.getDate() + ' ' + months[d.getMonth()];
}

// Угадываем teacher_id по строке имени (фамилия + инициал)
function guessTeacherId(teacherName, teachers) {
  if (!teacherName || !teachers || !teachers.length) return null;
  const t = teacherName.toLowerCase().trim();
  // Сначала точное совпадение фамилии
  const surname = t.split(/\s+/)[0];
  let match = teachers.find(p => String(p.name || '').toLowerCase().includes(surname));
  if (match) return match.id;
  return null;
}
