<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Конструктор «Детали»</title>
<style>
/* ============== БАЗА ============== */
:root {
  --bg: #faf8f5;
  --card: #ffffff;
  --ink: #2a2a2a;
  --muted: #8a8580;
  --line: #ece6dd;
  --accent: #c2845b;          /* терракот «Деталей» */
  --accent-dark: #9c6543;
  --hover: #f5efe5;
  --green: #5b8a4e;
  --red: #c45a5a;
  --yellow: #d4a85c;
  --blue: #5b7a9a;
  --shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
}
button {
  font-family: inherit;
  font-size: 13px;
  padding: 7px 12px;
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--ink);
  border-radius: 6px;
  cursor: pointer;
  transition: all .12s ease;
  white-space: nowrap;
}
button:hover { background: var(--hover); border-color: var(--accent); }
button:active { transform: translateY(1px); }
button:disabled { opacity: .4; cursor: not-allowed; }
button.primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
button.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
button.ghost { background: transparent; border-color: transparent; color: var(--muted); }
button.ghost:hover { background: var(--hover); color: var(--ink); }
button.danger { color: var(--red); }
button.danger:hover { background: #fdf0f0; border-color: var(--red); }
input, select, textarea {
  font-family: inherit;
  font-size: 13px;
  padding: 7px 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: white;
  color: var(--ink);
  width: 100%;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(194,132,91,.12);
}
textarea { resize: vertical; min-height: 80px; }
label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }

/* ============== ЛОГИН ============== */
.login-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.login-card {
  background: var(--card);
  padding: 36px 40px;
  border-radius: 12px;
  box-shadow: var(--shadow);
  width: 360px;
  text-align: center;
}
.login-card h1 {
  margin: 0 0 8px 0;
  font-size: 22px;
  font-weight: 600;
}
.login-card .sub {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 24px;
}
.login-card input { margin-bottom: 12px; }
.login-card .err { color: var(--red); font-size: 12px; margin-top: 8px; height: 16px; }

/* ============== ЛЭЙАУТ ============== */
.app { display: none; min-height: 100vh; flex-direction: column; }
.app.show { display: flex; }
header {
  background: white;
  border-bottom: 1px solid var(--line);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
}
header h1 em {
  color: var(--accent);
  font-style: normal;
  font-weight: 600;
}
header .spacer { flex: 1; }
header .pill {
  background: var(--hover);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: var(--muted);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
header .pill.warn { background: #fdf6e8; color: var(--yellow); }
header .pill.alive { background: #eef5ec; color: var(--green); }
header .pill.warn::before, header .pill.alive::before {
  content: '';
  display: inline-block;
  width: 7px; height: 7px;
  background: currentColor;
  border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% {opacity:1} 50% {opacity:.4} }

.toolbar {
  background: white;
  padding: 10px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar .group { display: flex; gap: 4px; }
.toolbar .sep { width: 1px; height: 24px; background: var(--line); margin: 0 4px; }

main {
  flex: 1;
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
}
.calendar-wrap { min-width: 0; }
.sidebar { min-width: 0; }

/* ============== КАЛЕНДАРЬ ============== */
.month-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.month-header h2 {
  margin: 0;
  font-size: 22px;
  font-weight: 600;
  text-transform: capitalize;
}
.month-header .month-stats {
  margin-left: auto;
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--muted);
}
.month-header .month-stats b { color: var(--ink); font-size: 14px; }

.calendar {
  background: white;
  border-radius: 10px;
  border: 1px solid var(--line);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--hover);
  border-bottom: 1px solid var(--line);
}
.weekdays > div {
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.weekdays > div.weekend { color: var(--accent); }

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.day {
  min-height: 110px;
  padding: 6px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  position: relative;
  cursor: pointer;
  transition: background .12s;
}
.day:hover { background: var(--hover); }
.day:nth-child(7n) { border-right: none; }
.day.other-month { background: #faf8f5; opacity: .4; }
.day.weekend .day-num { color: var(--accent); }
.day.today { background: #fdf6e8; }
.day.today .day-num { background: var(--accent); color: white; }

.day-num {
  display: inline-block;
  min-width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  border-radius: 50%;
  margin-bottom: 4px;
}

.event-pill {
  display: block;
  background: var(--hover);
  border-left: 3px solid var(--accent);
  padding: 3px 6px;
  border-radius: 3px;
  font-size: 11px;
  margin-bottom: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
  line-height: 1.3;
}
.event-pill:hover { background: white; box-shadow: 0 0 0 1px var(--accent); }
.event-pill .time { color: var(--muted); margin-right: 4px; font-weight: 500; }
.event-pill .name { font-weight: 500; }
.event-pill.cat-mk      { border-left-color: #c2845b; background: #fdf3e9; }
.event-pill.cat-kino    { border-left-color: #5b7a9a; background: #eef2f7; }
.event-pill.cat-book    { border-left-color: #5b8a4e; background: #eef5ec; }
.event-pill.cat-party   { border-left-color: #b15a8a; background: #f9eaf2; }
.event-pill.cat-private { border-left-color: #d4a85c; background: #fdf6e8; }
.event-pill.cat-expert  { border-left-color: #7a5b9a; background: #f1edf7; }

.event-pill.st-draft     { opacity: 0.78; border-left-style: dashed; }
.event-pill.st-published { /* по умолчанию */ }
.event-pill.st-modified  { box-shadow: inset 0 0 0 2px var(--yellow); background: #fdf6e8; }
.badge {
  display: inline-block;
  background: var(--yellow);
  color: white;
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 4px;
  font-weight: 600;
  min-width: 18px;
  text-align: center;
}
.event-pill .status-mark {
  font-size: 9px;
  margin-right: 4px;
  opacity: 0.7;
}
.event-pill.st-published .status-mark { color: var(--green); opacity: 1; }
.event-pill.st-modified .status-mark { color: var(--yellow); opacity: 1; }

.event-pill.published-alfa::after {
  content: '✓';
  margin-left: 4px;
  color: var(--green);
  font-weight: bold;
}

/* ============== САЙДБАР ============== */
.sidebar-tabs {
  display: flex;
  background: white;
  border-radius: 8px;
  border: 1px solid var(--line);
  margin-bottom: 12px;
  overflow: hidden;
}
.sidebar-tabs button {
  flex: 1;
  border: none;
  border-radius: 0;
  padding: 10px;
  font-size: 12px;
  font-weight: 500;
  background: transparent;
  color: var(--muted);
}
.sidebar-tabs button.active {
  background: var(--accent);
  color: white;
}
.sidebar-tabs button:hover:not(.active) { background: var(--hover); color: var(--ink); }

.panel {
  background: white;
  border-radius: 8px;
  border: 1px solid var(--line);
  padding: 12px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}
.panel h3 {
  margin: 0 0 10px 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel h3 .count {
  background: var(--hover);
  color: var(--muted);
  font-weight: 500;
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 10px;
}

.list-item {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  border: 1px solid transparent;
}
.list-item:hover { background: var(--hover); border-color: var(--line); }
.list-item .meta { color: var(--muted); font-size: 11px; }
.list-item .ttl { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ============== МОДАЛКИ ============== */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(40,30,20,.45);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  z-index: 100;
  overflow-y: auto;
}
.modal-bg.show { display: flex; }
.modal {
  background: white;
  border-radius: 12px;
  width: 100%;
  max-width: 600px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  overflow: hidden;
  animation: slideIn .2s ease;
}
.modal.wide { max-width: 800px; }
@keyframes slideIn {
  from { transform: translateY(-20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
}
.modal-head h2 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }
.modal-body { padding: 16px 20px; max-height: 70vh; overflow-y: auto; }
.modal-foot {
  padding: 12px 20px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  gap: 8px;
  background: var(--bg);
}
.modal-foot .right { display: flex; gap: 8px; }

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.row.three { grid-template-columns: 1fr 1fr 1fr; }
.row.full { grid-template-columns: 1fr; }
.row > div { min-width: 0; }

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 13px;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  z-index: 1000;
  animation: toastIn .2s ease;
}
.toast.err { background: var(--red); }
.toast.ok { background: var(--green); }
@keyframes toastIn { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

.fin-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  font-size: 12px;
}
.fin-stats > div {
  background: var(--hover);
  padding: 8px 10px;
  border-radius: 6px;
}
.fin-stats > div .ttl { color: var(--muted); font-size: 11px; margin-bottom: 2px; }
.fin-stats > div .val { font-size: 16px; font-weight: 600; }
.fin-stats > div.green .val { color: var(--green); }

/* AI loader */
.ai-loader {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 1100px) {
  main { grid-template-columns: 1fr; }
  .sidebar { order: -1; }
}
@media (max-width: 700px) {
  .day { min-height: 80px; padding: 4px; font-size: 10px; }
  .event-pill { font-size: 10px; }
  header h1 { font-size: 14px; }
}
</style>
</head>
<body>

<!-- ====== ЭКРАН ВХОДА ====== -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Детали · конструктор</h1>
    <div class="sub">Сетка мероприятий студии</div>
    <input type="password" id="loginPwd" placeholder="Пароль" autofocus>
    <input type="text" id="loginName" placeholder="Ваше имя (для уведомлений)">
    <button class="primary" style="width:100%; padding:10px;" onclick="tryLogin()">Войти</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ====== ОСНОВНОЕ ПРИЛОЖЕНИЕ ====== -->
<div class="app" id="app">

  <header>
    <h1>Конструктор · <em>Детали</em></h1>
    <span class="pill alive" id="connPill">Соединено</span>
    <span class="pill warn" id="othersPill" style="display:none"></span>
    <div class="spacer"></div>
    <button class="ghost" onclick="logout()">🚪 Выйти</button>
  </header>

  <div class="toolbar">
    <div class="group">
      <button onclick="prevMonth()">‹</button>
      <button onclick="nextMonth()">›</button>
      <button onclick="goToToday()">Сегодня</button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button onclick="openEventEditor()">＋ Событие</button>
      <button onclick="openTemplatesPicker()">📚 Из шаблонов</button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button onclick="saveDraft()">💾 Сохранить</button>
      <button onclick="openDraftsList()">📁 Черновики</button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button class="primary" onclick="publishEventsToAlfa('create')" title="Создать в Альфе все события со статусом «Черновик»">🚀 Опубликовать черновики</button>
      <button onclick="publishEventsToAlfa('sync')" title="Применить в Альфе все изменения" id="syncBtn" style="display:none">🔄 Применить изменения <span id="syncCount" class="badge"></span></button>
      <button class="ghost" onclick="testAlfaConnection()" title="Проверить связь с Альфа CRM">🔍</button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button onclick="exportJson()">↓ JSON</button>
      <button onclick="importJson()">↑ JSON</button>
    </div>
  </div>

  <main>
    <div class="calendar-wrap">
      <div class="month-header">
        <h2 id="monthTitle">—</h2>
        <div class="month-stats" id="monthStats"></div>
      </div>
      <div class="calendar">
        <div class="weekdays" id="weekdays"></div>
        <div class="days" id="daysGrid"></div>
      </div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-tabs">
        <button class="active" data-tab="finance" onclick="switchTab('finance')">💰 Финансы</button>
        <button data-tab="library" onclick="switchTab('library')">📚 Библиотека</button>
        <button data-tab="staff" onclick="switchTab('staff')">👥 Педагоги</button>
      </div>

      <div id="tabFinance">
        <div class="panel">
          <h3>Месяц в цифрах</h3>
          <div class="fin-stats" id="finStats"></div>
        </div>
        <div class="panel">
          <h3>По форматам <span class="count" id="formatBreakdownCount">0</span></h3>
          <div id="formatBreakdown"></div>
        </div>
      </div>

      <div id="tabLibrary" style="display:none">
        <div class="panel">
          <h3>Шаблоны событий <span class="count" id="tplCount">0</span></h3>
          <div id="templatesList" style="max-height:500px; overflow-y:auto;"></div>
        </div>
        <div class="panel">
          <h3>Форматы <span class="count" id="fmtCount">0</span></h3>
          <div id="formatsList"></div>
          <button class="ghost" style="margin-top:8px; width:100%;" onclick="openAddFormat()">＋ Новый формат</button>
        </div>
      </div>

      <div id="tabStaff" style="display:none">
        <div class="panel">
          <h3>Педагоги <span class="count" id="staffCount">0</span></h3>
          <div id="staffList" style="max-height:500px; overflow-y:auto;"></div>
          <button class="ghost" style="margin-top:8px; width:100%;" onclick="openAddTeacher()">＋ Новый педагог</button>
        </div>
      </div>
    </aside>
  </main>
</div>

<!-- ====== МОДАЛКА: РЕДАКТИРОВАНИЕ СОБЫТИЯ ====== -->
<div class="modal-bg" id="eventModal">
  <div class="modal wide">
    <div class="modal-head">
      <h2 id="eventModalTitle">Новое событие</h2>
      <button class="ghost" onclick="closeModal('eventModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="row three">
        <div>
          <label>Дата</label>
          <input type="date" id="evDate">
        </div>
        <div>
          <label>Время начала</label>
          <input type="time" id="evTime">
        </div>
        <div>
          <label>Длительность (ч)</label>
          <input type="number" id="evDuration" step="0.5" min="0.5" value="2.5">
        </div>
      </div>
      <div class="row">
        <div>
          <label>Формат</label>
          <select id="evFormat" onchange="onFormatChange()"></select>
        </div>
        <div>
          <label>Педагог</label>
          <select id="evTeacher"></select>
        </div>
      </div>
      <div class="row full">
        <div>
          <label>Название события</label>
          <input type="text" id="evName" placeholder="Например: Кружка с предсказанием">
        </div>
      </div>
      <div class="row three">
        <div>
          <label>Цена клиенту, руб</label>
          <input type="number" id="evPrice" min="0">
        </div>
        <div>
          <label>Лимит участников</label>
          <input type="number" id="evLimit" min="1" value="12">
        </div>
        <div>
          <label>Расход на чел., руб</label>
          <input type="number" id="evCostPerson" min="0">
        </div>
      </div>
      <div class="row full">
        <div>
          <label>Описание (для маркетинга и Альфы)
            <button class="ghost" style="float:right; padding: 2px 8px; font-size: 11px;" onclick="aiGenerateDescription()" id="aiBtn">
              <span id="aiSpinner" style="display:none"><span class="ai-loader"></span></span>
              ✨ Сгенерировать ИИ
            </button>
          </label>
          <textarea id="evDescr" rows="6" placeholder="Краткий маркетинговый текст для публикации"></textarea>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Статус события в Альфе</label>
          <div id="evStatusBlock" style="padding:7px 10px; border:1px solid var(--line); border-radius:6px; background:#fafafa; min-height:34px; font-size:12px;">—</div>
        </div>
        <div>
          <label>Комментарий</label>
          <input type="text" id="evComment">
        </div>
      </div>
      <div class="row full" id="evCreateRow">
        <div>
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox" id="evPublishToAlfa" style="width:auto;">
            <span>Готово к публикации в Альфу <span style="color:var(--muted)">(будет создано при нажатии «🚀 Опубликовать черновики»)</span></span>
          </label>
        </div>
      </div>
      <details style="margin-top: 12px;">
        <summary style="cursor: pointer; color: var(--muted); font-size: 12px;">💡 Финансовый прогноз</summary>
        <div class="fin-stats" style="margin-top: 8px;" id="evFinStats"></div>
      </details>
    </div>
    <div class="modal-foot">
      <button class="danger" onclick="deleteCurrentEvent()" id="evDeleteBtn" style="display:none">🗑 Удалить</button>
      <div class="right">
        <button onclick="closeModal('eventModal')">Отмена</button>
        <button class="ghost" onclick="saveAsTemplate()">💾 В шаблоны</button>
        <button class="primary" onclick="saveEvent()">Сохранить</button>
      </div>
    </div>
  </div>

<script>
// ============================================================
// КОНФИГ — ПОДСТАВЬТЕ СВОЙ APPS_SCRIPT_URL ПОСЛЕ ДЕПЛОЯ
// ============================================================
const CONFIG = {
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyHrfjsxMyN2TGfAw-JH8MN0KW8QdUUy-bIQSlgjtEIciAw_FnbrL8ay5CrEcqrcQrF/exec',
  PROJECT: 'details',
  PASSWORD_HASH: '19082026' // меняется в коде; см. README
};

// ============================================================
// СОСТОЯНИЕ ПРИЛОЖЕНИЯ
// ============================================================
const state = {
  // навигация
  curMonth: new Date(),
  // данные с сервера
  formats: [],
  teachers: [],
  templates: [],
  // календарь — события { id, date 'YYYY-MM-DD', timeStart 'HH:MM', duration, format, name, teacher, price, limit, costPerPerson, description, publishToAlfa, comment }
  events: [],
  // черновики
  draftId: null,
  draftName: '',
  // публикация
  publishId: null,
  // сессия
  sessionId: 's_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4),
  editorName: '',
  // редактирование события
  editingEventId: null
};

// ============================================================
// ВХОД
// ============================================================
function tryLogin() {
  const pwd = document.getElementById('loginPwd').value;
  const name = document.getElementById('loginName').value.trim();
  if (pwd !== CONFIG.PASSWORD_HASH) {
    document.getElementById('loginErr').textContent = 'Неверный пароль';
    return;
  }
  if (!name) {
    document.getElementById('loginErr').textContent = 'Введите имя';
    return;
  }
  state.editorName = name;
  localStorage.setItem('detali_pwd', pwd);
  localStorage.setItem('detali_name', name);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  bootstrap();
}

function logout() {
  if (!confirm('Точно выйти?')) return;
  localStorage.removeItem('detali_pwd');
  localStorage.removeItem('detali_name');
  endSession();
  location.reload();
}

(function autoLogin() {
  const pwd = localStorage.getItem('detali_pwd');
  const name = localStorage.getItem('detali_name');
  if (pwd === CONFIG.PASSWORD_HASH && name) {
    state.editorName = name;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('show');
    bootstrap();
  }
  document.getElementById('loginPwd').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginName').focus(); });
  document.getElementById('loginName').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
})();

// ============================================================
// API
// ============================================================
async function apiGet(action, extra = {}) {
  const url = new URL(CONFIG.APPS_SCRIPT_URL);
  url.searchParams.set('action', action);
  url.searchParams.set('project', CONFIG.PROJECT);
  Object.entries(extra).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { method: 'GET' });
  return res.json();
}
async function apiPost(action, body = {}) {
  const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, project: CONFIG.PROJECT, ...body })
  });
  return res.json();
}

// ============================================================
// ИНИЦИАЛИЗАЦИЯ
// ============================================================
async function bootstrap() {
  if (CONFIG.APPS_SCRIPT_URL.includes('PUT_YOUR')) {
    toast('⚠ APPS_SCRIPT_URL не настроен в index.html', 'err');
    renderCalendar();
    return;
  }
  try {
    const r = await apiGet('all');
    if (r.ok) {
      state.formats = r.formats || [];
      state.teachers = r.teachers || [];
      state.templates = r.templates || [];
    } else {
      toast('Ошибка загрузки: ' + (r.error || ''), 'err');
    }
  } catch(e) {
    toast('Не удалось связаться с сервером', 'err');
  }

  // Загружаем единый рабочий черновик
  try {
    const dr = await apiGet('loadDraft', { id: 'working_main' });
    if (dr.ok && dr.draft) {
      state.draftId = dr.draft.id;
      state.draftName = dr.draft.name;
      state.events = (dr.draft.state && dr.draft.state.events) || [];
      // Открываем месяц с ближайшим событием
      if (state.events.length > 0) {
        const today = ymd(new Date());
        const future = state.events.filter(e => e.date >= today);
        const target = future.length ? future[0] : state.events[state.events.length - 1];
        if (target && target.date) {
          const [y, m] = target.date.split('-').map(Number);
          state.curMonth = new Date(y, m - 1, 1);
        }
      }
      toast('Загружено событий: ' + state.events.length, 'ok');
    }
  } catch(e) {
    // если нет рабочего черновика — это нормально, просто стартуем с пустого
  }

  renderCalendar();
  renderSidebar();
  startHeartbeat();
}

// ============================================================
// КАЛЕНДАРЬ
// ============================================================
const MONTH_NAMES = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const WEEKDAY_SHORT = ['пн','вт','ср','чт','пт','сб','вс'];

function renderCalendar() {
  const m = state.curMonth.getMonth();
  const y = state.curMonth.getFullYear();
  document.getElementById('monthTitle').textContent = MONTH_NAMES[m] + ' ' + y;

  // дни недели
  const wd = document.getElementById('weekdays');
  wd.innerHTML = WEEKDAY_SHORT.map((d, i) => `<div class="${i >= 5 ? 'weekend' : ''}">${d}</div>`).join('');

  // первый день месяца
  const first = new Date(y, m, 1);
  const last = new Date(y, m + 1, 0);
  // понедельник первой недели
  const startWd = (first.getDay() + 6) % 7;  // 0=пн
  const start = new Date(y, m, 1 - startWd);
  // ровно 6 недель = 42 дня
  const grid = document.getElementById('daysGrid');
  let html = '';
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dStr = ymd(d);
    const inMonth = d.getMonth() === m;
    const isToday = d.getTime() === today.getTime();
    const wkd = d.getDay();
    const isWe = wkd === 0 || wkd === 6;
    const dayEvents = state.events.filter(e => e.date === dStr && e.status !== 'archived');
    dayEvents.sort((a, b) => (a.timeStart || '99').localeCompare(b.timeStart || '99'));
    const eventsHtml = dayEvents.map(ev => {
      const st = ev.status || 'draft';
      const stIcon = st === 'published' ? '✓' : st === 'modified' ? '⏳' : '◌';
      const stTitle = st === 'published' ? 'Опубликовано в Альфе' : st === 'modified' ? 'Есть несохранённые изменения' : 'Черновик';
      return `
        <div class="event-pill ${categoryClass(ev.format)} st-${st}" onclick="event.stopPropagation(); openEventEditor('${ev.id}')" title="${stTitle}">
          <span class="time">${ev.timeStart || '—'}</span><span class="status-mark">${stIcon}</span><span class="name">${escapeHtml(ev.name || ev.format || '?')}</span>
        </div>
      `;
    }).join('');
    html += `
      <div class="day ${inMonth ? '' : 'other-month'} ${isWe ? 'weekend' : ''} ${isToday ? 'today' : ''}" onclick="openEventEditor(null, '${dStr}')">
        <span class="day-num">${d.getDate()}</span>
        ${eventsHtml}
      </div>
    `;
  }
  grid.innerHTML = html;
  renderMonthStats();
  renderFinanceTab();
  updateSyncButton();
}

function categoryClass(fmt) {
  if (!fmt) return '';
  const f = state.formats.find(x => x.name === fmt);
  const cat = (f && f.category) ? f.category.toLowerCase() : '';
  if (fmt.toLowerCase().startsWith('мк')) return 'cat-mk';
  if (fmt === 'Киновечер') return 'cat-kino';
  if (fmt === 'Книжный клуб') return 'cat-book';
  if (fmt === 'Вечеринка') return 'cat-party';
  if (fmt === 'День рождения' || fmt === 'Свидание') return 'cat-private';
  if (fmt === 'Встреча с экспертом') return 'cat-expert';
  return '';
}

function prevMonth() { state.curMonth = new Date(state.curMonth.getFullYear(), state.curMonth.getMonth() - 1, 1); renderCalendar(); }
function nextMonth() { state.curMonth = new Date(state.curMonth.getFullYear(), state.curMonth.getMonth() + 1, 1); renderCalendar(); }
function goToToday() { state.curMonth = new Date(); renderCalendar(); }

function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function renderMonthStats() {
  const m = state.curMonth.getMonth(), y = state.curMonth.getFullYear();
  const ev = state.events.filter(e => {
    if (e.status === 'archived') return false;
    const d = new Date(e.date);
    return d.getMonth() === m && d.getFullYear() === y;
  });
  const drafts = ev.filter(e => (e.status || 'draft') === 'draft').length;
  const published = ev.filter(e => e.status === 'published').length;
  const modified = ev.filter(e => e.status === 'modified').length;
  const revenue = ev.reduce((s, e) => s + (e.price || 0) * (e.limit || 0), 0);
  document.getElementById('monthStats').innerHTML = `
    <div title="Всего событий в месяце">📅 <b>${ev.length}</b> событий</div>
    <div title="Черновики (не в Альфе)">◌ <b>${drafts}</b></div>
    <div title="Опубликованы в Альфе">✓ <b style="color:var(--green)">${published}</b></div>
    ${modified > 0 ? `<div title="Изменения не отправлены в Альфу" style="color:var(--yellow)">⏳ <b>${modified}</b> к синку</div>` : ''}
    <div>💰 <b>${fmt(revenue)}</b> план</div>
  `;
}

// ============================================================
// САЙДБАР
// ============================================================
function switchTab(t) {
  document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sidebar-tabs button[data-tab="${t}"]`).classList.add('active');
  ['finance','library','staff'].forEach(x => document.getElementById('tab' + cap(x)).style.display = (x === t ? 'block' : 'none'));
  if (t === 'library') renderLibraryTab();
  if (t === 'staff') renderStaffTab();
}
function cap(s) { return s[0].toUpperCase() + s.slice(1); }

function renderSidebar() {
  renderFinanceTab();
}

function renderFinanceTab() {
  const m = state.curMonth.getMonth(), y = state.curMonth.getFullYear();
  const ev = state.events.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === m && d.getFullYear() === y;
  });
  let revenue = 0, cost = 0;
  ev.forEach(e => {
    const r = (e.price || 0) * (e.limit || 0);
    const teacher = state.teachers.find(t => t.name === e.teacher);
    const teacherCost = teacher && teacher.rate ? teacher.rate : 0;
    const c = teacherCost + (e.costPerPerson || 0) * (e.limit || 0);
    revenue += r;
    cost += c;
  });
  const margin = revenue - cost;
  document.getElementById('finStats').innerHTML = `
    <div><div class="ttl">Выручка</div><div class="val">${fmt(revenue)}</div></div>
    <div><div class="ttl">Расход</div><div class="val">${fmt(cost)}</div></div>
    <div class="green"><div class="ttl">Маржа</div><div class="val">${fmt(margin)}</div></div>
  `;
  // По форматам
  const byFmt = {};
  ev.forEach(e => {
    if (!byFmt[e.format]) byFmt[e.format] = { count: 0, revenue: 0 };
    byFmt[e.format].count++;
    byFmt[e.format].revenue += (e.price || 0) * (e.limit || 0);
  });
  const arr = Object.entries(byFmt).sort((a,b) => b[1].count - a[1].count);
  document.getElementById('formatBreakdownCount').textContent = arr.length;
  document.getElementById('formatBreakdown').innerHTML = arr.length ? arr.map(([f, s]) => `
    <div class="list-item">
      <span class="ttl">${escapeHtml(f || '—')}</span>
      <span class="meta">${s.count} · ${fmt(s.revenue)}</span>
    </div>
  `).join('') : '<div style="color:var(--muted); padding: 8px; font-size: 12px;">Нет событий</div>';
}

function renderLibraryTab() {
  document.getElementById('tplCount').textContent = state.templates.length;
  document.getElementById('templatesList').innerHTML = state.templates.length ? state.templates.map(t => `
    <div class="list-item" onclick="useTemplate(${t.rowIdx})">
      <div style="flex:1; min-width:0;">
        <div class="ttl">${escapeHtml(t.name)}</div>
        <div class="meta">${escapeHtml(t.format || '')} ${t.price ? '· ' + t.price + ' руб' : ''}</div>
      </div>
      <div class="meta">×${t.usedCount || 0}</div>
    </div>
  `).join('') : '<div style="color:var(--muted); padding: 8px; font-size: 12px;">Шаблонов пока нет. Создайте событие и нажмите «В шаблоны».</div>';

  document.getElementById('fmtCount').textContent = state.formats.length;
  document.getElementById('formatsList').innerHTML = state.formats.map(f => `
    <div class="list-item">
      <span class="ttl">${escapeHtml(f.name)}</span>
      <span class="meta">${escapeHtml(f.category || '')}</span>
    </div>
  `).join('');
}

function renderStaffTab() {
  document.getElementById('staffCount').textContent = state.teachers.length;
  document.getElementById('staffList').innerHTML = state.teachers.map(t => `
    <div class="list-item">
      <div style="flex:1; min-width:0;">
        <div class="ttl">${escapeHtml(t.name)}</div>
        <div class="meta">${escapeHtml(t.spec || '')}${t.rate ? ' · ' + t.rate + ' руб' : ''}</div>
      </div>
    </div>
  `).join('');
}

// ============================================================
// СОБЫТИЕ — РЕДАКТОР
// ============================================================
function openEventEditor(eventId, defaultDate) {
  state.editingEventId = eventId;
  const isEdit = !!eventId;
  document.getElementById('eventModalTitle').textContent = isEdit ? 'Редактировать событие' : 'Новое событие';
  document.getElementById('evDeleteBtn').style.display = isEdit ? 'inline-block' : 'none';

  // селекты
  const fmtSel = document.getElementById('evFormat');
  fmtSel.innerHTML = '<option value="">— выберите —</option>' + state.formats.map(f => `<option>${escapeHtml(f.name)}</option>`).join('');
  const tSel = document.getElementById('evTeacher');
  tSel.innerHTML = '<option value="">— не выбран —</option>' + state.teachers.map(t => `<option>${escapeHtml(t.name)}</option>`).join('');

  // дефолты или текущие
  const ev = isEdit ? state.events.find(e => e.id === eventId) : null;
  document.getElementById('evDate').value = ev ? ev.date : (defaultDate || ymd(new Date()));
  document.getElementById('evTime').value = ev ? (ev.timeStart || '18:00') : '18:00';
  document.getElementById('evDuration').value = ev ? (ev.duration || 2.5) : 2.5;
  fmtSel.value = ev ? (ev.format || '') : '';
  document.getElementById('evName').value = ev ? (ev.name || '') : '';
  tSel.value = ev ? (ev.teacher || '') : '';
  document.getElementById('evPrice').value = ev ? (ev.price ?? '') : '';
  document.getElementById('evLimit').value = ev ? (ev.limit ?? 12) : 12;
  document.getElementById('evCostPerson').value = ev ? (ev.costPerPerson ?? '') : '';
  document.getElementById('evDescr').value = ev ? (ev.description || '') : '';
  document.getElementById('evPublishToAlfa').checked = ev ? !!ev.publishToAlfa : false;
  document.getElementById('evComment').value = ev ? (ev.comment || '') : '';

  // Блок статуса
  const stBlock = document.getElementById('evStatusBlock');
  const createRow = document.getElementById('evCreateRow');
  if (!ev || ev.status === 'draft' || !ev.status) {
    stBlock.innerHTML = '<span style="color:var(--muted)">◌ Черновик · в Альфе ещё не создано</span>';
    createRow.style.display = 'block';
  } else if (ev.status === 'published') {
    stBlock.innerHTML = `<span style="color:var(--green)">✓ Опубликовано в Альфе · группа id=${ev.alfaGroupId}</span>` +
      (ev.formUrl ? `<br><a href="${ev.formUrl}" target="_blank" style="font-size:11px;">🔗 Ссылка для записи клиентов</a>` : '');
    createRow.style.display = 'none';
  } else if (ev.status === 'modified') {
    stBlock.innerHTML = `<span style="color:var(--yellow)">⏳ Есть изменения, не отправленные в Альфу (id=${ev.alfaGroupId})</span><br>` +
      `<span style="font-size:11px; color:var(--muted)">Нажмите «🔄 Применить изменения» в шапке, чтобы синхронизировать</span>`;
    createRow.style.display = 'none';
  } else if (ev.status === 'archived') {
    stBlock.innerHTML = '<span style="color:var(--red)">🗑 Помечено к архивации</span>';
    createRow.style.display = 'none';
  }

  updateEventFinStats();
  ['evPrice','evLimit','evCostPerson','evTeacher'].forEach(id =>
    document.getElementById(id).addEventListener('input', updateEventFinStats, { once: true })
  );

  document.getElementById('eventModal').classList.add('show');
}

function onFormatChange() {
  const fmtName = document.getElementById('evFormat').value;
  const f = state.formats.find(x => x.name === fmtName);
  if (!f) return;
  // Если поля пустые — заполняем дефолтами формата
  const priceEl = document.getElementById('evPrice');
  const limitEl = document.getElementById('evLimit');
  const durEl = document.getElementById('evDuration');
  if (!priceEl.value && f.defaultPrice) priceEl.value = f.defaultPrice;
  if (!limitEl.value && f.defaultLimit) limitEl.value = f.defaultLimit;
  if (!durEl.value && f.defaultDuration) durEl.value = f.defaultDuration;
  updateEventFinStats();
}

function updateEventFinStats() {
  const price = parseFloat(document.getElementById('evPrice').value) || 0;
  const limit = parseInt(document.getElementById('evLimit').value) || 0;
  const cpp = parseFloat(document.getElementById('evCostPerson').value) || 0;
  const teacherName = document.getElementById('evTeacher').value;
  const teacher = state.teachers.find(t => t.name === teacherName);
  const teacherRate = teacher && teacher.rate ? teacher.rate : 0;
  const revenue = price * limit;
  const cost = teacherRate + cpp * limit;
  const margin = revenue - cost;
  document.getElementById('evFinStats').innerHTML = `
    <div><div class="ttl">Выручка max</div><div class="val">${fmt(revenue)}</div></div>
    <div><div class="ttl">Расход</div><div class="val">${fmt(cost)}</div></div>
    <div class="${margin >= 0 ? 'green' : ''}"><div class="ttl">Маржа</div><div class="val">${fmt(margin)}</div></div>
  `;
}

function saveEvent() {
  const newData = {
    id: state.editingEventId || ('e_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4)),
    date: document.getElementById('evDate').value,
    timeStart: document.getElementById('evTime').value,
    duration: parseFloat(document.getElementById('evDuration').value) || 2.5,
    format: document.getElementById('evFormat').value,
    name: document.getElementById('evName').value.trim(),
    teacher: document.getElementById('evTeacher').value,
    price: parseFloat(document.getElementById('evPrice').value) || null,
    limit: parseInt(document.getElementById('evLimit').value) || null,
    costPerPerson: parseFloat(document.getElementById('evCostPerson').value) || null,
    description: document.getElementById('evDescr').value.trim(),
    publishToAlfa: document.getElementById('evPublishToAlfa').checked,
    comment: document.getElementById('evComment').value.trim()
  };
  if (!newData.date)   { toast('Укажите дату', 'err'); return; }
  if (!newData.format) { toast('Выберите формат', 'err'); return; }
  if (!newData.name)   { toast('Укажите название', 'err'); return; }

  const idx = state.events.findIndex(e => e.id === newData.id);
  if (idx < 0) {
    // Новое событие — статус 'draft'
    state.events.push({
      ...newData,
      status: 'draft',
      alfaGroupId: null,
      alfaLessonId: null,
      formUrl: ''
    });
    toast('Событие добавлено как черновик', 'ok');
  } else {
    // Редактирование — определяем, изменилось ли что-то существенное
    const prev = state.events[idx];
    const fieldsForAlfa = ['date','timeStart','duration','format','name','price','limit','description'];
    let hasAlfaChange = false;
    for (const f of fieldsForAlfa) {
      if ((prev[f] || '') !== (newData[f] || '')) { hasAlfaChange = true; break; }
    }
    let newStatus = prev.status || 'draft';
    if (prev.status === 'published' && hasAlfaChange) {
      newStatus = 'modified';
    }
    state.events[idx] = {
      ...prev,
      ...newData,
      status: newStatus,
      // ID и formUrl сохраняем
      alfaGroupId: prev.alfaGroupId || null,
      alfaLessonId: prev.alfaLessonId || null,
      formUrl: prev.formUrl || ''
    };
    if (newStatus === 'modified') {
      toast('Событие обновлено · нужно «Применить в Альфу»', 'ok');
    } else {
      toast('Событие обновлено', 'ok');
    }
  }

  closeModal('eventModal');
  renderCalendar();
  autosaveDraft();
}

function deleteCurrentEvent() {
  if (!state.editingEventId) return;
  const ev = state.events.find(e => e.id === state.editingEventId);
  if (!ev) return;
  if (ev.status === 'published' && ev.alfaGroupId) {
    if (!confirm(
      'Это событие УЖЕ опубликовано в Альфе (id=' + ev.alfaGroupId + ').\n\n' +
      'Удалить из конструктора и архивировать в Альфе?\n' +
      '(если на группу записаны клиенты — их данные не пропадут, но группа станет неактивной)'
    )) return;
    // Помечаем archived — реальная архивация произойдёт при «Применить в Альфу»
    ev.status = 'archived';
    closeModal('eventModal');
    renderCalendar();
    toast('Событие помечено к архивации · нажмите «Применить в Альфу»', 'ok');
    autosaveDraft();
    return;
  }
  // Чистый черновик — просто удаляем
  if (!confirm('Удалить это событие?')) return;
  state.events = state.events.filter(e => e.id !== state.editingEventId);
  closeModal('eventModal');
  renderCalendar();
  toast('Удалено', 'ok');
  autosaveDraft();
}

// Тихое автосохранение черновика — чтобы изменения не терялись.
// Всегда сохраняем в единый рабочий черновик 'working_main'.
let autosaveTimer = null;
function autosaveDraft() {
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(async () => {
    try {
      const r = await apiPost('saveDraft', {

      if (r.ok && r.draft) {

        state.draftName = r.draft.name;
      }
    } catch(e) {}
  }, 1500);
}

/**
 * Унифицированная публикация в Альфу.
 * mode = 'create' — отправляем в Альфу события со статусом 'draft' (создание)
 *                  + все 'modified' (синхронизация) + 'archived' (архивация)
 * mode = 'sync'   — то же самое, но если черновиков нет — просто синк изменений
 *
 * На бэке всё обрабатывается одним actionом syncEventsToAlfa.
 */
async function publishEventsToAlfa(mode) {
  if (state.events.length === 0) {
    toast('В календаре нет событий', 'err');
    return;
  }

  // Считаем что и в каком статусе
  const drafts   = state.events.filter(e => (e.status || 'draft') === 'draft');
  const modified = state.events.filter(e => e.status === 'modified');
  const archived = state.events.filter(e => e.status === 'archived');

  // Для 'create' будем отправлять только черновики, помеченные galочкой publishToAlfa.
  // Если галочки нет — делаем подтверждение «Опубликовать всех?»
  let toCreateCount;
  if (mode === 'create') {
    toCreateCount = drafts.filter(e => e.publishToAlfa).length;
    if (toCreateCount === 0 && drafts.length > 0) {
      if (confirm(
        `${drafts.length} черновиков, но ни у одного нет галочки «Готово к публикации».\n\n` +
        `Опубликовать ВСЕ черновики?`
      )) {
        // временно ставим всем черновикам publishToAlfa
        drafts.forEach(d => d.publishToAlfa = true);
        toCreateCount = drafts.length;
      } else {
        return;
      }
    }
  } else {
    // mode='sync' — черновики не трогаем (их публикуют отдельной кнопкой)
    toCreateCount = 0;
  }

  if (toCreateCount === 0 && modified.length === 0 && archived.length === 0) {
    toast('Нет изменений для отправки в Альфу', 'err');
    return;
  }

  const summary = [];
  if (toCreateCount > 0) summary.push(`создать: ${toCreateCount}`);
  if (modified.length > 0) summary.push(`обновить: ${modified.length}`);
  if (archived.length > 0) summary.push(`архивировать: ${archived.length}`);
  if (!confirm('В Альфу будет отправлено:\n• ' + summary.join('\n• ') + '\n\nПродолжить?')) return;

  const id = state.publishId || ('p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4));
  const monthLabel = MONTH_NAMES[state.curMonth.getMonth()] + ' ' + state.curMonth.getFullYear();

  toast('Отправляю в Альфу…', 'ok');

  // ВНИМАНИЕ: бэку передаём те статусы, которые конкретно надо обработать.
  // Для create-режима черновики уже помечены publishToAlfa=true.
  // Бэк сам разделит по статусам (draft+publishToAlfa → create, modified → update, archived → archive).
  const r = await apiPost('syncEventsToAlfa', {
    id,
    name: monthLabel + ' — ' + state.editorName,
    stateJson: JSON.stringify(currentState())
  });

  if (!r.ok) {
    toast('Ошибка: ' + (r.error || ''), 'err');
    return;
  }

  state.publishId = id;
  const alfa = r.alfa || {};

  // Обновляем локальные статусы по результатам
  if (alfa.results) {
    alfa.results.forEach(res => {
      const ev = state.events.find(e => e.id === res.id);
      if (!ev) return;
      if (res.error) return; // оставляем как было
      if (res.op === 'create' && res.groupId) {
        ev.status = 'published';
        ev.alfaGroupId = res.groupId;
        ev.alfaLessonId = res.lessonId;
        ev.formUrl = res.formUrl;
        ev.publishedToAlfa = true;
      } else if (res.op === 'update') {
        ev.status = 'published';   // снова синк
      } else if (res.op === 'archive') {
        // событие останется со статусом archived — фильтруется при отрисовке
      }
    });
  }

  // Удаляем архивированные из локального состояния
  state.events = state.events.filter(e => e.status !== 'archived');

  renderCalendar();
  await autosaveDraft();

  // Показываем результат
  let html = '';
  if (alfa.created > 0) html += `<div>✅ Создано в Альфе: <b style="color:var(--green)">${alfa.created}</b></div>`;
  if (alfa.updated > 0) html += `<div>🔄 Обновлено: <b>${alfa.updated}</b></div>`;
  if (alfa.archived > 0) html += `<div>🗑 Архивировано: <b>${alfa.archived}</b></div>`;
  if (alfa.errors > 0) {
    html += `<div style="color:var(--red); margin-top: 8px;">⚠ Ошибок: <b>${alfa.errors}</b></div>`;
    const errs = (alfa.results || []).filter(x => x.error).slice(0, 5);
    html += errs.map(e =>
      '<div style="font-size:11px; color:var(--red); margin-top:4px;">• ' +
        escapeHtml(e.name || e.id) + ' (' + e.op + ') — ' + escapeHtml(e.error) +
      '</div>'
    ).join('');
  }
  if (!html) html = 'Нет операций в Альфе.';
  showResultModal('Результат', html);
}

let heartbeatTimer = null;

function startHeartbeat() {
  // ID для совместного редактирования = текущий месяц
  const sendBeat = async () => {
    const publishId = ymd(state.curMonth).slice(0, 7);
    try {
      await apiPost('heartbeat', {
        sessionId: state.sessionId,
        publishId,
        editorName: state.editorName,
        userAgent: navigator.userAgent.slice(0, 80)
      });
      const r = await apiGet('listSessions', { publishId });
      const others = (r.sessions || []).filter(s => s.sessionId !== state.sessionId);
      const pill = document.getElementById('othersPill');
      if (others.length > 0) {
        pill.textContent = '⚠ Сейчас редактирует: ' + others.map(o => o.editorName).filter(Boolean).join(', ');
        pill.style.display = 'inline-flex';
      } else {
        pill.style.display = 'none';
      }
    } catch(e) {
      // молча
    }
  };
  sendBeat();
  heartbeatTimer = setInterval(sendBeat, 30000);
  window.addEventListener('beforeunload', endSession);
}

async function endSession() {
  try {
    await apiPost('endSession', { sessionId: state.sessionId });
  } catch(e) {}
  if (heartbeatTimer) clearInterval(heartbeatTimer);
}

// ============================================================
// ЭКСПОРТ / ИМПОРТ
// ============================================================
function exportJson() {
  const blob = new Blob([JSON.stringify(currentState(), null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'detali_' + ymd(state.curMonth).slice(0, 7) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJson() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.events) state.events = data.events;
        if (data.monthKey) {
          const [y, m] = data.monthKey.split('-').map(Number);
          state.curMonth = new Date(y, m - 1, 1);
        }
        renderCalendar();
        toast('Импортировано', 'ok');
      } catch(err) {
        toast('Битый JSON', 'err');
      }
    };
    r.readAsText(f);
  };
  inp.click();
}

// ============================================================
// УТИЛИТЫ UI
// ============================================================
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return Math.round(n).toLocaleString('ru-RU') + ' р';
}

function formatTimeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'только что';
  if (diff < 3600) return Math.round(diff / 60) + ' мин назад';
  if (diff < 86400) return Math.round(diff / 3600) + ' ч назад';
  return d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU').slice(0,5);
}

// Закрытие модалок по клику на фон
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('show'); });
});
// Esc закрывает модалки
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-bg.show').forEach(m => m.classList.remove('show'));
});
</script>
