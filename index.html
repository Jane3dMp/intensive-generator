<!-- Генератор расписания интенсивов «Прознание + Coddy» -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интенсивы — Прознание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700;800&family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2A2A28;
    --ink-soft: #545452;
    --paper: #F7F3EA;
    --paper-warm: #FBF7EE;
    --paper-deep: #EDE7DA;
    --paper-muted: #E5DECF;
    --yellow: #F5DC8A;
    --yellow-deep: #DEC162;
    --yellow-soft: #FBF1D2;
    --orange-soft: #F3DEB7;
    --white: #FFFFFF;
    --shadow: rgba(42,42,40,0.06);
    --danger: #B86060;

    /* Цвета направлений (пастельные) */
    --dir-it-bg: #C9E5F0;          /* IT — мятно-голубой */
    --dir-it-border: #92BFD0;
    --dir-soft-bg: #C9E4CB;         /* Soft — мягкий зелёный */
    --dir-soft-border: #91BD93;
    --dir-creative-bg: #F2E1A8;    /* Творчество — пастельный жёлтый */
    --dir-creative-border: #C8B16D;
    --dir-mno-bg: #E8C9D3;          /* МНО — нежно-розовый */
    --dir-mno-border: #BD8B9C;
    --dir-mixed-bg: #DDD7C8;        /* Смешанная — тёплый серо-бежевый */
    --dir-mixed-border: #ACA48F;
    --dir-default-bg: #DCEBE4;     /* по умолчанию (без направления) */
    --dir-default-border: #95B6A4;

    /* Алиасы для обратной совместимости */
    --green: var(--dir-default-bg);
    --green-deep: var(--dir-default-border);
    --green-soft: #E8F1EB;
    --sky: var(--dir-it-bg);
    --sky-deep: var(--dir-it-border);
    --sky-soft: #E8F2F7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Geologica, system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    padding: 20px;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 5%, rgba(254,214,52,0.06) 0%, transparent 40%),
      radial-gradient(circle at 90% 95%, rgba(65,190,234,0.05) 0%, transparent 40%);
  }

  .header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 16px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
  }
  .title-block { flex: 1; min-width: 280px; }
  .eyebrow {
    font-family: Inter, sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(21,22,23,0.55);
    margin-bottom: 6px;
    font-weight: 500;
  }
  h1 {
    font-family: Geologica, sans-serif;
    font-weight: 600;
    font-size: 32px;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  h1 em {
    font-family: Caveat, cursive;
    font-style: normal;
    font-weight: 600;
    background: var(--yellow);
    padding: 0 8px;
    border-radius: 4px;
  }
  .subtitle {
    font-family: Inter, sans-serif;
    font-size: 13px;
    color: rgba(21,22,23,0.6);
    margin-top: 6px;
  }

  .dir-legend {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .dir-chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: Inter, sans-serif;
    font-size: 10px;
    font-weight: 500;
    background: var(--dir-default-bg);
    border: 1px solid var(--dir-default-border);
    color: var(--ink);
  }
  .dir-chip.dir-it      { background: var(--dir-it-bg);       border-color: var(--dir-it-border); }
  .dir-chip.dir-soft    { background: var(--dir-soft-bg);     border-color: var(--dir-soft-border); }
  .dir-chip.dir-creative{ background: var(--dir-creative-bg); border-color: var(--dir-creative-border); }
  .dir-chip.dir-mno     { background: var(--dir-mno-bg);      border-color: var(--dir-mno-border); }
  .dir-chip.dir-mixed   { background: var(--dir-mixed-bg);    border-color: var(--dir-mixed-border); }

  /* Кнопки */
  .btn {
    font-family: Inter, sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 12px;
    border: 1px solid var(--ink);
    background: var(--white);
    color: var(--ink);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--paper-deep); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary {
    background: var(--yellow);
    border-color: var(--ink);
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--yellow-deep); }
  .btn-ghost { background: transparent; border-color: rgba(21,22,23,0.3); }
  .btn-sm { padding: 4px 8px; font-size: 11px; }
  .btn-danger { color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: #fef2f0; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
    align-items: center;
  }

  /* Шапка-настройки */
  .config-bar {
    background: var(--paper-warm);
    border: 1px solid rgba(21,22,23,0.15);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 18px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  .config-bar label {
    font-family: Inter, sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(21,22,23,0.55);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .config-bar input[type=text],
  .config-bar input[type=date],
  .config-bar input[type=number] {
    font-family: Geologica, sans-serif;
    font-size: 14px;
    padding: 6px 10px;
    border: 1px solid rgba(21,22,23,0.25);
    border-radius: 4px;
    background: var(--white);
    color: var(--ink);
    text-transform: none;
    letter-spacing: 0;
  }

  /* Локации (3 шапки таблицы) */
  .locations-edit {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }
  .location-edit {
    background: var(--yellow);
    border: 1px solid var(--ink);
    border-radius: 4px;
    padding: 10px 14px;
    text-align: center;
    transition: background 0.15s;
  }
  .location-edit:hover {
    background: var(--yellow-deep);
  }
  .location-edit input {
    background: transparent;
    border: none;
    font-family: Geologica, sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    color: var(--ink);
    outline: none;
  }
  .location-edit input:focus {
    background: var(--white);
    outline: 1px solid var(--ink);
    border-radius: 2px;
  }
  .location-addr-line {
    margin-top: 4px;
    font-family: Inter, sans-serif;
    font-size: 11px;
    font-style: italic;
    color: rgba(42,42,40,0.7);
    text-align: center;
  }
  .location-addr-line .contact-mark {
    margin-left: 2px;
    font-size: 10px;
    opacity: 0.7;
  }
  .location-addr-line .settings-cog {
    margin-left: 6px;
    font-style: normal;
    opacity: 0.4;
    font-size: 12px;
  }
  .location-edit:hover .location-addr-line .settings-cog {
    opacity: 1;
  }

  /* Таблица недель */
  .schedule {
    background: var(--white);
    border: 1px solid var(--ink);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .month-header {
    background: var(--orange-soft);
    border-top: 2px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 8px 14px;
    font-family: Geologica, sans-serif;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .month-header:first-child { border-top: none; }

  .marker-header {
    background: var(--paper-deep);
    border-bottom: 1px solid var(--ink);
    padding: 6px 14px;
    font-family: Inter, sans-serif;
    font-weight: 600;
    font-size: 13px;
    text-align: center;
    color: rgba(21,22,23,0.7);
    cursor: pointer;
    transition: background 0.15s;
  }
  .marker-header:hover { background: rgba(21,22,23,0.12); }
  .marker-header input {
    background: transparent;
    border: none;
    font-family: Inter, sans-serif;
    font-weight: 600;
    font-size: 13px;
    text-align: center;
    color: rgba(21,22,23,0.7);
    width: 100%;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    outline: none;
    cursor: text;
  }
  .marker-header input:focus {
    background: var(--white);
    outline: 1px solid var(--ink);
    border-radius: 2px;
  }

  .week-action {
    background: transparent;
    border: 1px solid rgba(42,42,40,0.15);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 11px;
    font-family: Inter, sans-serif;
    color: rgba(42,42,40,0.5);
    cursor: pointer;
    line-height: 1;
    transition: all 0.15s;
  }
  .week-action:hover:not(:disabled) {
    background: var(--white);
    color: var(--ink);
    border-color: var(--ink);
  }
  .week-action:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .week-action.danger:hover { color: var(--danger); border-color: var(--danger); }

  /* Неделя — 3 колонки */
  .week-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-bottom: 1px solid rgba(21,22,23,0.15);
  }
  .week-row:last-child { border-bottom: none; }

  .location-cell {
    border-right: 1px solid rgba(21,22,23,0.15);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 100px;
  }
  .location-cell:last-child { border-right: none; }

  .week-date {
    font-family: Geologica, sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    background: var(--green);
    padding: 3px 8px;
    border-radius: 3px;
    display: inline-block;
    width: fit-content;
    cursor: pointer;
  }
  .week-date.empty {
    background: transparent;
    color: rgba(21,22,23,0.3);
    border: 1px dashed rgba(21,22,23,0.3);
    font-weight: 400;
  }
  .week-date input {
    background: transparent;
    border: none;
    font-family: Geologica, sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    width: 100%;
    outline: none;
  }

  .multi-day-banner {
    background: var(--orange-soft);
    border: 1px solid #e0b056;
    padding: 4px 10px;
    border-radius: 3px;
    font-family: Inter, sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    margin-top: 2px;
  }

  /* Бейдж стоимости в углу слота */
  .cost-badge {
    background: var(--white);
    border: 1px solid var(--ink);
    border-radius: 10px;
    padding: 1px 7px;
    font-family: Inter, sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
    cursor: text;
    white-space: nowrap;
    min-width: 36px;
    text-align: center;
    outline: none;
  }
  .cost-badge:focus { background: var(--yellow-soft); }
  .cost-badge:empty::before { content: '—р'; color: rgba(21,22,23,0.35); font-weight: 400; }

  /* Слоты времени */
  .slot {
    display: grid;
    grid-template-columns: 84px 1fr 80px 50px 30px;
    gap: 6px;
    align-items: center;
    padding: 5px 6px;
    border-radius: 3px;
    background: var(--dir-default-bg);
    border: 1px solid var(--dir-default-border);
    cursor: text;
    transition: background 0.2s, border-color 0.2s;
  }
  /* Заполненные слоты — раскладка с педагогом под темой (2 строки) */
  .slot.filled {
    grid-template-columns: 84px 1fr 50px 30px;
    grid-template-areas:
      "time theme cost actions"
      "time teacher cost actions";
    column-gap: 6px;
    row-gap: 0;
  }
  .slot.filled .time { grid-area: time; align-self: center; }
  .slot.filled .theme-wrap { grid-area: theme; align-self: center; }
  .slot.filled .teacher { grid-area: teacher; font-size: 10px; font-style: italic; opacity: 0.75; padding: 0; }
  .slot.filled .cost-badge { grid-area: cost; align-self: center; }
  .slot.filled .slot-actions { grid-area: actions; }

  /* Кружок-индикатор статуса в углу слота */
  .status-dot {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    box-shadow: 0 0 0 1.5px var(--white);
  }
  .status-dot.draft     { background: rgba(42,42,40,0.35); }
  .status-dot.approved  { background: #5FB835; }
  .status-dot.reserve   { background: #DEC162; }
  .slot { position: relative; }
  /* Слоты по направлениям */
  .slot.dir-it      { background: var(--dir-it-bg);       border-color: var(--dir-it-border); }
  .slot.dir-soft    { background: var(--dir-soft-bg);     border-color: var(--dir-soft-border); }
  .slot.dir-creative{ background: var(--dir-creative-bg); border-color: var(--dir-creative-border); }
  .slot.dir-mno     { background: var(--dir-mno-bg);      border-color: var(--dir-mno-border); }
  .slot.dir-mixed   { background: var(--dir-mixed-bg);    border-color: var(--dir-mixed-border); }
  .slot.empty {
    background: transparent;
    border: 1px dashed rgba(21,22,23,0.15);
    opacity: 0.55;
    transition: opacity 0.2s;
  }
  .slot.empty:hover {
    background: rgba(126,217,87,0.15);
    border-color: var(--green-deep);
    opacity: 1;
  }
  /* Локационная ячейка целиком тоже бледнеет, если в ней нет ни одной заполненной темы */
  .location-cell.dim { opacity: 0.45; transition: opacity 0.2s; }
  .location-cell.dim:hover { opacity: 1; }
  .slot input {
    background: transparent;
    border: none;
    font-family: Inter, sans-serif;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    width: 100%;
    padding: 2px 0;
  }
  .slot input::placeholder { color: rgba(21,22,23,0.35); }
  .slot input:focus {
    background: var(--white);
    outline: 1px solid rgba(21,22,23,0.3);
    border-radius: 2px;
    padding: 2px 4px;
  }
  .slot input.theme { font-weight: 500; }
  .slot input.cost { text-align: right; font-variant-numeric: tabular-nums; }
  .slot input.time {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  /* Обёртка темы + иконки ⓘ */
  .theme-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
  }
  .theme-wrap .theme { flex: 1; min-width: 0; }
  .info-btn {
    flex-shrink: 0;
    background: transparent;
    border: none;
    padding: 0 2px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    color: rgba(42,42,40,0.25);
    transition: color 0.15s, transform 0.15s;
  }
  .info-btn:hover { color: var(--ink); transform: scale(1.15); }
  .info-btn.has-desc { color: rgba(42,42,40,0.7); }
  .info-btn.has-desc:hover { color: var(--ink); }
  .slot-actions {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .slot-action {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 11px;
    padding: 1px;
    line-height: 1;
    border-radius: 2px;
    color: rgba(21,22,23,0.5);
  }
  .slot-action.slot-arrow {
    font-size: 8px;
    padding: 0 1px;
    height: 10px;
    opacity: 0.4;
  }
  .slot-action:hover { background: rgba(0,0,0,0.07); color: var(--ink); }
  .slot-action.slot-arrow:hover { opacity: 1; }
  .slot.empty .slot-actions { visibility: hidden; }
  .slot.empty:hover .slot-actions { visibility: visible; }

  .add-slot-btn {
    background: transparent;
    border: 1px dashed rgba(21,22,23,0.25);
    color: rgba(21,22,23,0.55);
    font-family: Inter, sans-serif;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    width: fit-content;
    transition: all 0.15s;
  }
  .add-slot-btn:hover {
    background: var(--paper-deep);
    color: var(--ink);
    border-style: solid;
  }

  /* Тосты */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 6px;
    font-family: Inter, sans-serif;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 1000;
    max-width: 360px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--green-deep); }

  /* Модалка */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(21,22,23,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--white);
    border: 1px solid var(--ink);
    border-radius: 8px;
    padding: 24px;
    max-width: 560px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .modal h2 {
    font-family: Geologica, sans-serif;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .modal p {
    font-family: Inter, sans-serif;
    font-size: 14px;
    color: rgba(21,22,23,0.7);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .modal label {
    display: block;
    font-family: Inter, sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(21,22,23,0.55);
    margin-bottom: 4px;
    margin-top: 12px;
  }
  .modal input[type=text],
  .modal input[type=number],
  .modal select,
  .modal textarea {
    font-family: Geologica, sans-serif;
    font-size: 14px;
    padding: 8px 10px;
    border: 1px solid rgba(21,22,23,0.25);
    border-radius: 4px;
    background: var(--white);
    color: var(--ink);
    width: 100%;
  }
  .modal textarea { resize: vertical; min-height: 80px; }

  .lib-suggestion {
    border: 1px solid rgba(21,22,23,0.15);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--paper-warm);
  }
  .lib-suggestion:hover {
    border-color: var(--ink);
    background: var(--yellow-soft);
    transform: translateX(2px);
  }
  .lib-suggestion .name {
    font-weight: 600;
    font-size: 14px;
  }
  .lib-suggestion .meta {
    font-family: Inter, sans-serif;
    font-size: 11px;
    color: rgba(21,22,23,0.6);
    margin-top: 3px;
  }

  /* Раздел публикаций */
  .pub-list {
    margin-top: 12px;
  }
  .pub-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border: 1px solid rgba(21,22,23,0.15);
    border-radius: 4px;
    margin-bottom: 6px;
    background: var(--paper-warm);
  }
  .pub-item .pub-name {
    flex: 1;
    font-weight: 500;
    font-size: 13px;
  }
  .pub-item .pub-meta {
    font-family: Inter, sans-serif;
    font-size: 11px;
    color: rgba(21,22,23,0.55);
  }

  /* Загрузчик */
  .loader {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(21,22,23,0.2);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Бейдж неоп. изм. */

  /* Read-only режим */

  @media (max-width: 900px) {

<script>
// ============================================================
// КОНФИГУРАЦИЯ
// ============================================================
// URL Apps Script Web App. Подставьте свой после деплоя Code.gs.
// До настройки можно работать с пустой библиотекой и localStorage.
const LIBRARY_URL = 'https://script.google.com/macros/s/AKfycbzbsD_4-SLX2sdd8rhhJAwWYA5UJtaRZ42uwaI1Q1BgD67tHvMitclU5wSnqkn94t2F/exec';

// Тип проекта — отделяет данные интенсивов от лагерных в общем Apps Script
const PROJECT_TYPE = 'intensive';

// Сессии: heartbeat каждые N мс
const SESSION_HEARTBEAT_MS = 60000;

// ============================================================
// ГЛОБАЛЬНОЕ СОСТОЯНИЕ
// ============================================================
let LIBRARY = [];         // активности из Sheets
let DETAILS = {};         // реквизиты
let state = null;         // текущая сетка
let _sessionId = null;
let _editorName = '';
let _isReadOnly = false;
let _heartbeatTimer = null;
let _undoStack = [];      // стек прошлых state-снимков (до 20)
const MAX_UNDO = 20;

// localStorage ключ
const LS_KEY = 'intensive_state_v1';

// Сейчас загружено ли уже из URL (чтобы не загрузить дважды)
let _initialized = false;

// ============================================================
// КОНСТАНТЫ
// ============================================================
const MONTHS_NOM = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

// Маркеры смен (как на скрине). Просто справочные подписи между рядами.
const DEFAULT_MARKERS = ['Смешанная','МНО','Творческая','IT'];

// Дефолтные слоты времени
const DEFAULT_SLOTS = ['11-13', '14-16'];

// ============================================================
// SLOT / WEEK / STATE — фабрики
// ============================================================
function makeSlot(opts={}) {
  return {
    time: opts.time || '11-13',
    theme: opts.theme || '',
    teacher: opts.teacher || '',
    cost: opts.cost || '',
    direction: opts.direction || '',  // IT / Soft / Творчество / МНО / Смешанная — для окраски
    status: opts.status || 'draft',  // draft / approved / reserve
    color: opts.color || 'green',  // 'green' (норма) | '' (без цвета)
    description: opts.description || '',  // расширенное описание (через ИИ)
    template: opts.template || '',  // имя шаблона из библиотеки если использован
    locked: false
  };
}

function makeLocationData() {
  return {
    dateRange: '',         // "1 - 5 июня"
    multiDayLabel: '',     // "4 дня" / "5 дней" — банер сверху
    slots: [
      makeSlot({ time: '11-13' }),
      makeSlot({ time: '14-16' })
    ]
  };
}

function makeWeek(opts={}) {
  return {
    id: 'w_' + Math.random().toString(36).slice(2, 9),
    month: opts.month || '',     // "июнь" — для группировки
    marker: opts.marker || '',    // "МНО" / "Творческая" / etc.
    locations: [
      makeLocationData(),
      makeLocationData(),
      makeLocationData()
    ]
  };
}

function makeDefaultState() {
  // Стартовая раскладка — 16 недель (как на скрине июнь-август)
  // с типичными датами и маркерами. Пользователь правит.
  const weeks = [];
  // ИЮНЬ
  weeks.push({ ...makeWeek(), month: 'июнь', marker: 'Смешанная' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '1 - 5 июня');
  weeks.push({ ...makeWeek(), month: 'июнь', marker: 'Смешанная' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '8 - 12 июня');
  weeks.push({ ...makeWeek(), month: 'июнь', marker: 'МНО' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '15 - 19 июня');
  weeks.push({ ...makeWeek(), month: 'июнь', marker: 'МНО' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '22 - 26 июня');
  // ИЮЛЬ
  weeks.push({ ...makeWeek(), month: 'июль', marker: 'Творческая' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '29 - 3 июля');
  weeks.push({ ...makeWeek(), month: 'июль', marker: 'Творческая' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '6 - 10 июля');
  weeks.push({ ...makeWeek(), month: 'июль', marker: 'IT' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '13 - 17 июля');
  weeks.push({ ...makeWeek(), month: 'июль', marker: 'IT' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '20 - 24 июля');
  weeks.push({ ...makeWeek(), month: 'июль', marker: 'МНО' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '27 - 31 июля');
  // АВГУСТ
  weeks.push({ ...makeWeek(), month: 'август', marker: 'МНО' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '3 - 7 августа');
  weeks.push({ ...makeWeek(), month: 'август', marker: 'Смешанная' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '10 - 14 августа');
  weeks.push({ ...makeWeek(), month: 'август', marker: 'Смешанная' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '17 - 21 августа');
  weeks.push({ ...makeWeek(), month: 'август', marker: 'Смешанная' });
  weeks[weeks.length-1].locations.forEach(l => l.dateRange = '24 - 28 августа');

  return {
    title: 'Интенсивы лето 2026',
    ages: '6–11 лет',
    defaultCost: 40,
    locations: ['Кластер', 'Детали', 'Спутник'],
    locationAddresses: ['Пожарный 19', 'Пожарный 3Б-2', 'Якубовского 19'],
    locationDetails: [
      { phone1: '', phone2: '', viber1: '', viber2: '', groupSize: '' },
      { phone1: '', phone2: '', viber1: '', viber2: '', groupSize: '' },
      { phone1: '', phone2: '', viber1: '', viber2: '', groupSize: '' }
    ],
    bringWithYou: '',  // общий список «что приносить с собой» — отдельный блок для родителей
    weeks: weeks,
    publishId: null,
    _draftId: null,
    _draftName: ''
  };
}

// ============================================================
// LIBRARY (загрузка)
// ============================================================
async function loadLibrary() {
  try {
    const url = LIBRARY_URL + '?action=all&project=' + encodeURIComponent(PROJECT_TYPE);
    const r = await fetch(url);
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'API error');
    LIBRARY = Array.isArray(data.activities) ? data.activities : [];
    DETAILS = (data.details && typeof data.details === 'object') ? data.details : {};
    setStatus('Библиотека: ' + LIBRARY.length + ' тем');
    return LIBRARY;
  } catch(e) {
    console.error('loadLibrary failed:', e);
    setStatus('⚠ Библиотека недоступна — работаю локально');
    LIBRARY = [];
    return [];
  }
}

function setStatus(msg) {
  const el = document.getElementById('status-line');
  if (el) el.textContent = msg;
}

// ============================================================
// LOCAL STORAGE / UNDO
// ============================================================
function saveLocal() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    updatePubIndicator();
  } catch(e) {
    console.warn('saveLocal:', e);
  }
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    return obj && typeof obj === 'object' ? obj : null;
  } catch(e) {
    return null;
  }
}

function pushUndo() {
  if (!state) return;
  try {
    _undoStack.push(JSON.stringify(state));
    if (_undoStack.length > MAX_UNDO) _undoStack.shift();
    document.getElementById('btn-undo').disabled = false;
  } catch(e) {}
}

function undoLast() {
  if (!_undoStack.length) return;
  const prev = _undoStack.pop();
  try {
    state = JSON.parse(prev);
    saveLocal();
    render();
    toast('Отменено', 'success');
  } catch(e) {}
  if (!_undoStack.length) document.getElementById('btn-undo').disabled = true;
}

// Ctrl+Z
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    undoLast();
  }
});

// ============================================================
// TOAST
// ============================================================
let _toastTimer = null;
function toast(msg, kind='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (kind || '');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, 3500);
}

// ============================================================
// MODAL
// ============================================================
function openModal(html) {
  const wrap = document.getElementById('modal-overlay');
  document.getElementById('modal-content').innerHTML = html;
  wrap.classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeJs(s) {
  return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
}

// ============================================================
// RENDER
// ============================================================
function render() {
  if (!state) return;

  // Конфиг-бар
  document.getElementById('cfg-title').value = state.title || '';
  document.getElementById('cfg-ages').value = state.ages || '';
  document.getElementById('cfg-cost').value = state.defaultCost || '';
  document.getElementById('cfg-editor').value = _editorName || '';

  renderLocations();
  renderSchedule();
  updatePubIndicator();
}

function renderLocations() {
  const wrap = document.getElementById('locations-edit');
  wrap.innerHTML = state.locations.map((name, i) => {
    const addr = (state.locationAddresses && state.locationAddresses[i]) || '';
    const det = (state.locationDetails && state.locationDetails[i]) || {};
    const hasContacts = !!(det.phone1 || det.phone2 || det.viber1 || det.viber2 || det.groupSize);
    return `
    <div class="location-edit" onclick="if(!event.target.closest('input'))openLocationSettings(${i})" style="cursor:pointer">
      <input type="text" value="${escapeHtml(name)}" data-loc-idx="${i}"
        onchange="renameLocation(${i}, this.value)"
        onclick="event.stopPropagation()"
        title="редактировать название (или кликни мимо для настроек)">
      <div class="location-addr-line" title="клик — настройки локации, контакты, размер группы">
        ${addr ? escapeHtml(addr) : '<span style="opacity:0.45">+ адрес и контакты</span>'}
        ${hasContacts ? ' <span class="contact-mark">📞</span>' : ''}
        <span class="settings-cog">⚙</span>
      </div>
    </div>
  `;
  }).join('');
  // Мобильные вкладки — те же названия, но как кнопки
  const tabsWrap = document.getElementById('mobile-loc-tabs');
  if (tabsWrap) {
    tabsWrap.innerHTML = state.locations.map((name, i) => `
      <button class="mobile-loc-tab ${i === _mobileLocIdx ? 'active' : ''}"
        onclick="setMobileLoc(${i})">${escapeHtml(name)}</button>
    `).join('');
  }
  // Применяем класс к body (на десктопе CSS его игнорирует)
  applyMobileLocClass();
}

function openLocationSettings(idx) {
  if (!state.locationDetails) state.locationDetails = [{},{},{}];
  while (state.locationDetails.length < 3) state.locationDetails.push({});
  const det = state.locationDetails[idx] || {};
  const name = state.locations[idx] || '';
  const addr = (state.locationAddresses && state.locationAddresses[idx]) || '';
  openModal(`
    <h2>Настройки локации</h2>
    <p style="font-family:Inter,sans-serif;font-size:12px;color:rgba(42,42,40,0.6);margin-bottom:14px">${escapeHtml(name)}</p>

    <label>Название</label>
    <input type="text" id="ls-name" value="${escapeHtml(name)}" placeholder="Кластер">

    <label>Адрес</label>
    <input type="text" id="ls-addr" value="${escapeHtml(addr)}" placeholder="напр. Пожарный 19">

    <label>Размер группы (детей)</label>
    <input type="text" id="ls-group" value="${escapeHtml(det.groupSize || '')}" placeholder="напр. до 10 детей">

    <div style="margin-top:14px;padding:10px 12px;background:var(--paper-warm);border-radius:6px;border:1px solid rgba(42,42,40,0.1)">
      <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:8px">Контакт 1</div>
      <label style="margin-top:0">Телефон</label>
      <input type="text" id="ls-phone1" value="${escapeHtml(det.phone1 || '')}" placeholder="+375 29 ...">
      <label>Viber (номер или ссылка)</label>
      <input type="text" id="ls-viber1" value="${escapeHtml(det.viber1 || '')}" placeholder="+375 29 ... или viber://chat?number=...">
      <label>Telegram (имя пользователя или ссылка)</label>
      <input type="text" id="ls-tg1" value="${escapeHtml(det.telegram1 || '')}" placeholder="@username или https://t.me/username">
    </div>

    <div style="margin-top:10px;padding:10px 12px;background:var(--paper-warm);border-radius:6px;border:1px solid rgba(42,42,40,0.1)">
      <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:8px">Контакт 2</div>
      <label style="margin-top:0">Телефон</label>
      <input type="text" id="ls-phone2" value="${escapeHtml(det.phone2 || '')}" placeholder="+375 33 ...">
      <label>Viber</label>
      <input type="text" id="ls-viber2" value="${escapeHtml(det.viber2 || '')}" placeholder="+375 33 ... или viber://chat?number=...">
      <label>Telegram</label>
      <input type="text" id="ls-tg2" value="${escapeHtml(det.telegram2 || '')}" placeholder="@username или https://t.me/username">
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">отмена</button>
      <button class="btn btn-primary" onclick="saveLocationSettings(${idx})">сохранить</button>
    </div>
  `);
}

function saveLocationSettings(idx) {
  pushUndo();
  if (!state.locationDetails) state.locationDetails = [{},{},{}];
  if (!state.locationAddresses) state.locationAddresses = ['','',''];
  state.locations[idx] = document.getElementById('ls-name').value.trim() || ('Локация ' + (idx+1));
  state.locationAddresses[idx] = document.getElementById('ls-addr').value.trim();
  state.locationDetails[idx] = {
    phone1: document.getElementById('ls-phone1').value.trim(),
    phone2: document.getElementById('ls-phone2').value.trim(),
    viber1: document.getElementById('ls-viber1').value.trim(),
    viber2: document.getElementById('ls-viber2').value.trim(),
    telegram1: document.getElementById('ls-tg1').value.trim(),
    telegram2: document.getElementById('ls-tg2').value.trim(),
    groupSize: document.getElementById('ls-group').value.trim()
  };
  saveLocal();
  closeModal();
  render();
  toast('Настройки локации сохранены', 'success');
}

function openBringWithYouModal() {
  const cur = state.bringWithYou || '';
  openModal(`
    <h2>🎒 Что приносить с собой</h2>
    <p style="font-family:Inter,sans-serif;font-size:12px;color:rgba(42,42,40,0.6);margin-bottom:14px">
      Общий список — будет показан в попапе программы каждого интенсива (для родителей и маркетинга). Можно перечислять через запятую или с переносами строк.
    </p>
    <textarea id="bw-text" placeholder="напр. Бутылка воды, перекус, сменная обувь, удобная одежда" style="min-height:120px">${escapeHtml(cur)}</textarea>

function renderSchedule() {
  const wrap = document.getElementById('schedule');
  let html = '';
  let lastMonth = null;

  state.weeks.forEach((w, wIdx) => {
    // Заголовок месяца
    if (w.month !== lastMonth) {
      html += `<div class="month-header">${escapeHtml(w.month || '—')}</div>`;
      lastMonth = w.month;
    }
    // Маркер смены лагеря + кнопки управления неделей
    const isFirst = wIdx === 0;
    const isLast = wIdx === state.weeks.length - 1;
    html += `
      <div class="marker-header" style="display:flex;align-items:center;gap:6px;padding:4px 10px">
        <input type="text" value="${escapeHtml(w.marker || '')}"
          placeholder="—маркер смены (МНО / Творческая / Смешанная / IT) —"
          onchange="setWeekMarker('${w.id}', this.value)" style="flex:1;background:transparent;border:none;font-family:Inter,sans-serif;font-weight:600;font-size:13px;text-align:center;color:rgba(42,42,40,0.7);text-transform:uppercase;letter-spacing:0.05em;outline:none;cursor:text">
        <div class="week-actions" style="display:flex;gap:2px;flex-shrink:0">
          <button class="week-action" onclick="moveWeek('${w.id}', -1)" title="выше" ${isFirst?'disabled':''}>▲</button>
          <button class="week-action" onclick="moveWeek('${w.id}', 1)" title="ниже" ${isLast?'disabled':''}>▼</button>
          <button class="week-action" onclick="openWeekMenu('${w.id}')" title="меню">⋯</button>
          <button class="week-action danger" onclick="removeWeekRow('${w.id}')" title="удалить">✕</button>
        </div>
      </div>
    `;
    // Ряд недели — 3 колонки
    html += `<div class="week-row">`;
    w.locations.forEach((loc, lIdx) => {
      html += renderLocationCell(w, wIdx, loc, lIdx);
    });
    html += `</div>`;
  });

  wrap.innerHTML = html;
}

function renderLocationCell(week, wIdx, loc, lIdx) {
  const dateClass = loc.dateRange ? 'week-date' : 'week-date empty';
  // Затемняем ячейку, если в ней нет ни одной заполненной темы
  const hasFilled = loc.slots.some(s => s.theme || s.teacher);
  // Полностью пустая (нет ни даты, ни тем) — для скрытия на мобиле
  const fullyEmpty = !hasFilled && !loc.dateRange && !loc.multiDayLabel;
  let cellClass = 'location-cell';
  if (!hasFilled) cellClass += ' dim';
  if (fullyEmpty) cellClass += ' empty-row';
  let html = `<div class="${cellClass}" data-loc-idx="${lIdx}">`;
  html += `<div class="${dateClass}">
    <input type="text" value="${escapeHtml(loc.dateRange || '')}"
      placeholder="—дата—"
      onchange="setLocDate('${week.id}', ${lIdx}, this.value)" style="background:transparent;border:none;width:100%;outline:none;font:inherit;color:inherit">
  </div>`;

  // Многодневный банер: ручной → как есть, иначе автоматически из даты
  const autoDays = calcDaysLabel(loc.dateRange);
  const dayLabel = loc.multiDayLabel || autoDays;
  if (dayLabel) {
    const isAuto = !loc.multiDayLabel && autoDays;
    html += `<div class="multi-day-banner" onclick="editMultiDay('${week.id}', ${lIdx})" title="${isAuto ? 'автоматически из даты — клик чтобы изменить' : 'клик чтобы изменить'}" style="${isAuto ? 'opacity:0.7;font-style:italic' : ''}">${escapeHtml(dayLabel)}</div>`;
  } else {
    html += `<button class="add-slot-btn" onclick="editMultiDay('${week.id}', ${lIdx})" style="font-size:10px;padding:2px 6px">+ длит.</button>`;
  }

  // Слоты
  loc.slots.forEach((slot, sIdx) => {
    html += renderSlot(week.id, wIdx, lIdx, slot, sIdx);
  });

  // Кнопка добавить слот
  html += `<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">`;
  html += `<button class="add-slot-btn" onclick="addSlot('${week.id}', ${lIdx})">＋ слот</button>`;
  if (loc.manualOrder && loc.slots.length > 1) {
    html += `<button class="add-slot-btn" onclick="resortSlotsByTime('${week.id}', ${lIdx})" title="отсортировать слоты по времени">🔃 по времени</button>`;
  }
  html += `</div>`;

  html += `</div>`;
  return html;
}

function renderSlot(weekId, wIdx, lIdx, slot, sIdx) {
  const isEmpty = !(slot.theme || slot.teacher);
  const dirClass = directionToClass(slot.direction);
  const cls = isEmpty ? 'slot empty' : ('slot filled ' + dirClass).trim();
  if (isEmpty) {
    // Пустой слот — клик по нему открывает меню «откуда взять тему»
    return `
      <div class="${cls}" data-slot="${weekId}-${lIdx}-${sIdx}"
           onclick="if(event.target===this||event.target.classList.contains('time-stub'))openSlotPicker('${weekId}',${lIdx},${sIdx})">
        <input class="time" value="${escapeHtml(slot.time)}" placeholder="11-13"
          onchange="setSlotField('${weekId}',${lIdx},${sIdx},'time',this.value)" title="время"
          onclick="event.stopPropagation()">
        <span class="time-stub" style="grid-column: span 3; color: rgba(21,22,23,0.4); font-family: Inter, sans-serif; font-size: 12px; padding: 2px 0; cursor: pointer;">+ выбрать тему…</span>
        <div class="slot-actions">
          <button class="slot-action" onclick="event.stopPropagation();openSlotMenu('${weekId}',${lIdx},${sIdx})" title="меню">⋯</button>
          <button class="slot-action" onclick="event.stopPropagation();removeSlot('${weekId}',${lIdx},${sIdx})" title="удалить">✕</button>
        </div>
      </div>
    `;
  }
  // Заполненный слот — обычные поля
  const hasDesc = !!(slot.description && slot.description.trim());
  const status = slot.status || 'draft';
  return `
    <div class="${cls}" data-slot="${weekId}-${lIdx}-${sIdx}">
      <span class="status-dot ${status}" title="${status==='approved'?'утверждено':status==='reserve'?'в резерве':'черновик'}"></span>
      <input class="time" value="${escapeHtml(slot.time)}" placeholder="11-13"
        onchange="setSlotField('${weekId}',${lIdx},${sIdx},'time',this.value)" title="время">
      <span class="theme-wrap">
        <input class="theme" value="${escapeHtml(slot.theme)}" placeholder="тема занятия"
          onchange="setSlotField('${weekId}',${lIdx},${sIdx},'theme',this.value)">
        <button class="info-btn ${hasDesc ? 'has-desc' : ''}"
          onclick="showSlotProgram('${weekId}',${lIdx},${sIdx})"
          title="${hasDesc ? 'программа интенсива' : 'добавить описание'}">ⓘ</button>
      </span>
      <input class="teacher" value="${escapeHtml(slot.teacher)}" placeholder="педагог"
        onchange="setSlotField('${weekId}',${lIdx},${sIdx},'teacher',this.value)" style="grid-column:auto">
      <span class="cost-badge" contenteditable="true" title="стоимость, р"
        onblur="setSlotCost('${weekId}',${lIdx},${sIdx},this.textContent)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
        >${escapeHtml(formatCost(slot.cost))}</span>
      <div class="slot-actions">
        <button class="slot-action slot-arrow" onclick="moveSlot('${weekId}',${lIdx},${sIdx},-1)" title="выше">▲</button>
        <button class="slot-action slot-arrow" onclick="moveSlot('${weekId}',${lIdx},${sIdx},1)" title="ниже">▼</button>
        <button class="slot-action" onclick="openSlotMenu('${weekId}',${lIdx},${sIdx})" title="меню">⋯</button>
        <button class="slot-action" onclick="removeSlot('${weekId}',${lIdx},${sIdx})" title="удалить">✕</button>
      </div>
    </div>
  `;
}

// ============================================================
// EDIT HANDLERS
// ============================================================
function setTitle(v) { pushUndo(); state.title = v; saveLocal(); }
function setAges(v) { pushUndo(); state.ages = v; saveLocal(); }
function setDefaultCost(v) { pushUndo(); state.defaultCost = parseFloat(v) || 0; saveLocal(); }
function setEditor(v) {
  _editorName = v;
  try { localStorage.setItem('intensive_editor_name', v); } catch(e) {}
}

function findWeek(id) { return state.weeks.find(w => w.id === id); }

// Парсим время начала из строки времени слота: "14:00-16:00" → 14*60 = 840 минут от начала суток
function parseSlotStartMinutes(timeStr) {
  if (!timeStr) return 9999;
  const m = String(timeStr).match(/(\d{1,2})(?::(\d{2}))?/);
  if (!m) return 9999;
  const h = parseInt(m[1]) || 0;
  const min = parseInt(m[2]) || 0;
  return h * 60 + min;
}

// Сортировка слотов в ячейке по времени начала (если не закреплён ручной порядок)
function autoSortSlots(loc) {
  if (!loc || !loc.slots || loc.manualOrder) return;
  loc.slots.sort((a, b) => parseSlotStartMinutes(a.time) - parseSlotStartMinutes(b.time));
}

function setWeekMarker(weekId, val) {
  pushUndo();
  const w = findWeek(weekId); if (!w) return;
  w.marker = val;
  saveLocal();
}

function setLocDate(weekId, lIdx, val) {
  pushUndo();
  const w = findWeek(weekId); if (!w) return;
  w.locations[lIdx].dateRange = val;
  saveLocal();
  // не делаем render — только этот input уже обновлён
}

function setSlotField(weekId, lIdx, sIdx, field, val) {
  pushUndo();
  const w = findWeek(weekId); if (!w) return;
  const slot = w.locations[lIdx].slots[sIdx];
  if (!slot) return;
  slot[field] = val;
  saveLocal();
  // Если изменилось время — пересортировать ячейку и полный re-render
  if (field === 'time') {
    autoSortSlots(w.locations[lIdx]);
    saveLocal();
    render();
    return;
  }
  // Лёгкий ре-рендер только этой ячейки чтобы обновить класс empty/нормальный
  const cell = document.querySelector(`[data-slot="${weekId}-${lIdx}-${sIdx}"]`);
  if (cell) {
    if (slot.theme || slot.teacher) cell.classList.remove('empty');
    else cell.classList.add('empty');
    // И затемнение всей ячейки локации (если в ней появилась/исчезла тема)
    const parentCell = cell.closest('.location-cell');
    if (parentCell) {
      const hasFilled = w.locations[lIdx].slots.some(s => s.theme || s.teacher);
      if (hasFilled) parentCell.classList.remove('dim');
      else parentCell.classList.add('dim');
    }
  }
}

// Попап с программой интенсива (клик по иконке ⓘ)
function showSlotProgram(weekId, lIdx, sIdx) {
  const w = findWeek(weekId); if (!w) return;
  const slot = w.locations[lIdx].slots[sIdx];
  const locName = state.locations[lIdx];
  const locAddr = (state.locationAddresses && state.locationAddresses[lIdx]) || '';
  const locDet = (state.locationDetails && state.locationDetails[lIdx]) || {};
  const dateRange = w.locations[lIdx].dateRange;
  const dirClass = directionToClass(slot.direction);
  const dirLabel = slot.direction || '—';
  const cost = slot.cost ? slot.cost + 'р' : '—';
  const hasDesc = !!(slot.description && slot.description.trim());

  // Преобразуем переносы строк в <br>, чтобы программа сохраняла структуру
  const descHtml = hasDesc
    ? escapeHtml(slot.description).replace(/\n/g, '<br>')
    : '<em style="color:rgba(42,42,40,0.4)">Описание пока не добавлено. Используйте ✨ ИИ или впишите вручную через ⋯ меню.</em>';

  openModal(`
    <h2 style="margin-bottom:4px">${escapeHtml(slot.theme || '—')}</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      ${slot.direction ? `<span class="dir-chip ${dirClass}">${escapeHtml(dirLabel)}</span>` : ''}
      <span style="font-family:Inter,sans-serif;font-size:12px;color:rgba(42,42,40,0.6)">
        ${escapeHtml(locName)}${locAddr ? ' (' + escapeHtml(locAddr) + ')' : ''} · ${escapeHtml(dateRange || '—')} · ${escapeHtml(slot.time || '')}
      </span>
    </div>

    <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-family:Inter,sans-serif;font-size:13px;margin-bottom:14px">
      <span style="color:rgba(42,42,40,0.55)">Педагог</span>
      <span>${escapeHtml(slot.teacher || '—')}</span>
      ${locDet.groupSize ? `<span style="color:rgba(42,42,40,0.55)">Группа</span><span>${escapeHtml(locDet.groupSize)}</span>` : ''}
      <span style="color:rgba(42,42,40,0.55)">Стоимость</span>
      <span style="font-weight:500">${escapeHtml(cost)}</span>
    </div>

    <div style="border-top:1px solid rgba(42,42,40,0.1);padding-top:12px">
      <div style="font-family:Inter,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:8px">Программа интенсива</div>
      <div style="font-family:Geologica,sans-serif;font-size:14px;line-height:1.55;color:var(--ink)">${descHtml}</div>
    </div>

    ${renderBringWithYouBlock(state.bringWithYou)}
    ${renderContactsBlock(locDet)}

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">закрыть</button>
      <button class="btn btn-ghost" onclick="aiExpandDescription('${weekId}',${lIdx},${sIdx})">✨ ${hasDesc ? 'переписать через ИИ' : 'сгенерировать'}</button>
      <button class="btn btn-primary" onclick="closeModal();openSlotMenu('${weekId}',${lIdx},${sIdx})">✏ редактировать</button>
    </div>
  `);
}

// Универсальные хелперы для блоков «что приносить» и «контакты»
function renderBringWithYouBlock(text) {
  if (!text || !String(text).trim()) return '';
  const html = escapeHtml(String(text)).replace(/\n/g, '<br>');
  return `
    <div style="border-top:1px solid rgba(42,42,40,0.1);padding-top:12px;margin-top:12px">
      <div style="font-family:Inter,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(42,42,40,0.55);margin-bottom:6px">🎒 С собой</div>
      <div style="font-family:Geologica,sans-serif;font-size:13px;line-height:1.5;color:var(--ink)">${html}</div>
    </div>
  `;
}

// Превращает viber-номер в кликабельную ссылку
function formatViberLink(v) {
  if (!v) return '';
  const trimmed = String(v).trim();
  if (trimmed.startsWith('viber:') || trimmed.startsWith('http')) return trimmed;
  const digits = trimmed.replace(/[^\d+]/g, '');
  return 'viber://chat?number=' + encodeURIComponent(digits);
}

function formatTelegramLink(t) {
  if (!t) return '';
  const trimmed = String(t).trim();
  if (trimmed.startsWith('http')) return trimmed;
  // Очищаем от @ и пробелов
  const username = trimmed.replace(/^@/, '').replace(/\s+/g, '');
  return 'https://t.me/' + username;
}

function renderContactsBlock(locDet) {
  if (!locDet) return '';
  // Собираем пары: каждый «контакт» = (phone, viber, telegram)
  const contacts = [
    { phone: locDet.phone1, viber: locDet.viber1, tg: locDet.telegram1 },
    { phone: locDet.phone2, viber: locDet.viber2, tg: locDet.telegram2 }
  ].filter(c => c.phone || c.viber || c.tg);
  if (!contacts.length) return '';

  const rows = contacts.map(c => {
    const phoneBtn = c.phone
      ? `<a href="tel:${escapeHtml(c.phone.replace(/[^\d+]/g, ''))}" style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--paper-deep);border-radius:6px;text-decoration:none;color:var(--ink);font-family:Inter,sans-serif;font-size:14px">
          <span style="font-size:16px">📞</span>
          <span style="font-weight:500">${escapeHtml(c.phone)}</span>
        </a>`
      : `<div style="flex:1"></div>`;
    const viberBtn = c.viber
      ? `<a href="${escapeHtml(formatViberLink(c.viber))}" title="Viber" style="display:flex;align-items:center;justify-content:center;padding:10px 14px;background:var(--paper-deep);border-radius:6px;text-decoration:none;font-size:18px">💬</a>`
      : '';
    const tgBtn = c.tg
      ? `<a href="${escapeHtml(formatTelegramLink(c.tg))}" target="_blank" title="Telegram" style="display:flex;align-items:center;justify-content:center;padding:10px 14px;background:var(--paper-deep);border-radius:6px;text-decoration:none;font-size:18px">✈</a>`
      : '';
    return `<div style="display:flex;gap:6px;margin-bottom:6px">${phoneBtn}${viberBtn}${tgBtn}</div>`;

}

// Считает количество дней по строке диапазона: "1 - 5 июня" → "5 дней", "29 - 3 июля" → "5 дней"
function calcDaysLabel(dateRange) {
  if (!dateRange) return '';
  const nums = String(dateRange).match(/\d+/g);
  if (!nums || nums.length < 2) return '';
  const a = parseInt(nums[0]);
  const b = parseInt(nums[1]);
  if (isNaN(a) || isNaN(b)) return '';
  let days;
  if (b >= a) {
    days = b - a + 1;
  } else {
    days = (30 - a + 1) + b;
  }
  if (days < 1 || days > 14) return '';
  return days + ' ' + pluralizeDays(days);
}

function pluralizeDays(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'день';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'дня';
  return 'дней';
}

// Маппинг направления (как пишут в библиотеке) → CSS-класс окрашивания слота
function directionToClass(dir) {
  if (!dir) return '';
  const d = String(dir).toLowerCase().trim();
  if (d.includes('it') || d.includes('айт')) return 'dir-it';
  if (d.includes('soft') || d.includes('софт') || d.includes('навык')) return 'dir-soft';
  if (d.includes('твор') || d.includes('арт') || d.includes('art')) return 'dir-creative';
  if (d.includes('мно') || d.includes('наук') || d.includes('научн')) return 'dir-mno';
  if (d.includes('смеш') || d.includes('mixed')) return 'dir-mixed';
  return '';
}

// Формат стоимости для отображения в бейдже: "40р", или "" если нет
function formatCost(cost) {
  if (cost === null || cost === undefined || cost === '') return '';
  const num = String(cost).replace(/[^\d.]/g, '');
  if (!num) return '';
  return num + 'р';
}

// Сохранить стоимость из бейджа: парсим число из любой введённой строки

function addSlot(weekId, lIdx) {

  else if (!existingTimes.includes('10:30-13')) newTime = '10:30-13';
  else newTime = '';
  w.locations[lIdx].slots.push(makeSlot({ time: newTime }));
  autoSortSlots(w.locations[lIdx]);
  saveLocal();
  render();
}

// Перемещение слота вверх/вниз вручную. После этого ячейка переходит в режим
// ручного порядка (manualOrder=true) — автосортировка отключается до сброса.
function moveSlot(weekId, lIdx, sIdx, direction) {
  const w = findWeek(weekId); if (!w) return;
  const loc = w.locations[lIdx];
  if (!loc || !loc.slots) return;
  const newIdx = sIdx + direction;
  if (newIdx < 0 || newIdx >= loc.slots.length) return;
  pushUndo();
  // Меняем местами
  const tmp = loc.slots[sIdx];
  loc.slots[sIdx] = loc.slots[newIdx];
  loc.slots[newIdx] = tmp;
  // Закрепляем ручной порядок
  loc.manualOrder = true;
  saveLocal();
  render();
}

// Парсим длительность из строки времени: "14:00-16:00" → 120 мин, "10:30-13" → 150 мин
function parseTimeDuration(timeStr) {
  if (!timeStr) return 0;
  const m = String(timeStr).match(/(\d{1,2})(?::(\d{2}))?\s*-\s*(\d{1,2})(?::(\d{2}))?/);
  if (!m) return 0;
  const h1 = parseInt(m[1]) || 0;
  const m1 = parseInt(m[2]) || 0;
  const h2 = parseInt(m[3]) || 0;
  const m2 = parseInt(m[4]) || 0;
  const minutes = (h2 * 60 + m2) - (h1 * 60 + m1);
  return minutes > 0 ? minutes : 0;
}

// Сохранить текущие поля карточки слота как тему в библиотеку
async function saveSlotToLibrary(weekId, lIdx, sIdx) {
  // Берём значения прямо из открытых полей (а не из state — пользователь мог что-то изменить)
  const theme = document.getElementById('sm-theme').value.trim();
  const teacher = document.getElementById('sm-teacher').value.trim();
  const direction = document.getElementById('sm-direction').value.trim();
  const cost = document.getElementById('sm-cost').value.trim();
  const description = document.getElementById('sm-desc').value.trim();
  const time = document.getElementById('sm-time').value.trim();
  const locName = state.locations[lIdx] || '';

  if (!theme) { toast('Укажите тему', 'error'); return; }
  if (!teacher) { toast('Укажите педагога', 'error'); return; }
  if (!direction) { toast('Выберите направление', 'error'); return; }
  if (!description) {
    if (!confirm('Описание пустое. Сохранить тему без описания? (Лучше сначала ✨ расширить описание через ИИ)')) return;
  }

  // Готовим item
  const duration = parseTimeDuration(time) || 120;
  const item = {
    template: theme,
    teacher,
    direction,
    location: locName,
    age: state.ages || '6–11 лет',
    duration,
    format: 'интенсив',
    examples: '',
    description: description || ''
  };

  // Ищем в библиотеке тему с тем же названием (нечувствительно к регистру)
  const themeNorm = theme.toLowerCase().trim();
  const existingIdx = LIBRARY.findIndex(it =>
    String(it.template || it.name || '').toLowerCase().trim() === themeNorm
  );

  if (existingIdx >= 0) {
    const existing = LIBRARY[existingIdx];
    // Сохраняем в глобальную переменную чтобы избежать проблем с экранированием в onclick
    window._pendingLibItem = item;
    window._pendingLibRowIdx = existing.rowIdx;
    window._pendingSlotCtx = { weekId, lIdx, sIdx };
    // Спрашиваем что делать
    openModal(`
      <h2>Тема уже в библиотеке</h2>
      <p>«<b>${escapeHtml(theme)}</b>» уже есть в библиотеке (педагог: ${escapeHtml(existing.teacher || '—')}).</p>
      <p>Что сделать?</p>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:14px">
        <button class="btn" style="text-align:left;padding:12px;font-size:13px"
          onclick="doSaveToLibFromCtx(true)">
          ✏ <b>Обновить существующую</b><br>
          <span style="font-family:Inter,sans-serif;font-size:11px;color:rgba(42,42,40,0.55);font-weight:400">перезаписать педагога/описание/длительность</span>
        </button>
        <button class="btn" style="text-align:left;padding:12px;font-size:13px"
          onclick="doSaveToLibFromCtx(false)">
          ＋ <b>Создать копию</b><br>
          <span style="font-family:Inter,sans-serif;font-size:11px;color:rgba(42,42,40,0.55);font-weight:400">добавится отдельной строкой (например для другого педагога)</span>
        </button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal();openSlotMenu('${weekId}',${lIdx},${sIdx})">отмена</button>
      </div>
    `);
  } else {
    // Сразу добавляем
    doSaveToLib(item, null, weekId, lIdx, sIdx);
  }
}

function doSaveToLibFromCtx(isUpdate) {
  const item = window._pendingLibItem;
  const rowIdx = isUpdate ? window._pendingLibRowIdx : null;
  const ctx = window._pendingSlotCtx;
  if (!item || !ctx) return;
  doSaveToLib(item, rowIdx, ctx.weekId, ctx.lIdx, ctx.sIdx);
}

async function doSaveToLib(item, existingRowIdx, weekId, lIdx, sIdx) {
  const isUpdate = !!existingRowIdx;
  openModal(`<h2><span class="loader"></span> ${isUpdate ? 'Обновляю в библиотеке…' : 'Добавляю в библиотеку…'}</h2>`);
  try {
    const payload = {
      action: isUpdate ? 'updateLibraryItem' : 'addLibraryItem',
      project: PROJECT_TYPE,
      item
    };
    if (isUpdate) payload.rowIdx = existingRowIdx;
    const r = await fetch(LIBRARY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'API error');

    await loadLibrary();
    closeModal();
    toast(isUpdate ? '✓ Тема обновлена в библиотеке' : '✓ Тема добавлена в библиотеку', 'success');
    // Возвращаемся в карточку слота
    openSlotMenu(weekId, lIdx, sIdx);
  } catch(e) {
    closeModal();
    toast('Ошибка: ' + e.message, 'error');
    openSlotMenu(weekId, lIdx, sIdx);
  }
}

function clearSlot(weekId, lIdx, sIdx) {

function applyLibToSlot(weekId, lIdx, sIdx, libIdx) {
  pushUndo();
  const w = findWeek(weekId); if (!w) return;

  if (!item) return;

async function saveLibItem(idx) {
  const item = {
    template: document.getElementById('lib-template').value.trim(),
    teacher: document.getElementById('lib-teacher').value.trim(),
    direction: document.getElementById('lib-direction').value.trim(),
    location: document.getElementById('lib-location').value.trim(),

    format: document.getElementById('lib-format').value.trim() || 'интенсив',
    examples: document.getElementById('lib-examples').value.trim(),
    description: document.getElementById('lib-description').value.trim()
  };
  // Валидация обязательных полей
  if (!item.template) { toast('Укажите название', 'error'); return; }
  if (!item.teacher) { toast('Укажите педагога', 'error'); return; }
  if (!item.direction) { toast('Выберите направление', 'error'); return; }
  if (!item.description) { toast('Добавьте описание', 'error'); return; }

  const isEdit = (idx !== null && idx !== undefined && LIBRARY[idx]);
  const action = isEdit ? 'updateLibraryItem' : 'addLibraryItem';
  const payload = { action, project: PROJECT_TYPE, item };
  if (isEdit) payload.rowIdx = LIBRARY[idx].rowIdx;

  // Лоадинг
  openModal(`<h2><span class="loader"></span> ${isEdit ? 'Сохраняю…' : 'Добавляю…'}</h2>`);

  try {

      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });

    if (!data.ok) throw new Error(data.error || 'API error');

    closeModal();
    toast(isEdit ? 'Тема обновлена' : 'Тема добавлена', 'success');

    openLibraryPanel();

async function callClaude(prompt, system) {
  try {
    const r = await fetch(LIBRARY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'claude',
        project: PROJECT_TYPE,
        prompt: prompt,
        system: system || SYSTEM_PROMPT_INTENSIVE
      })
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'Apps Script error');
    if (!data.text) throw new Error('Пустой ответ ИИ');
    return data.text;
  } catch(e) {
    console.error('callClaude:', e);
    throw e;
  }
}

async function aiSuggestThemes() {
  // Найти первый пустой слот
  let target = null;
  for (const w of state.weeks) {
    for (let li = 0; li < w.locations.length; li++) {
      for (let si = 0; si < w.locations[li].slots.length; si++) {
        if (!w.locations[li].slots[si].theme) {
          target = { weekId: w.id, lIdx: li, sIdx: si };
          break;
        }
      }
      if (target) break;
    }
    if (target) break;
  }
  if (!target) {
    toast('Все слоты уже заполнены', 'success');
    return;
  }
  await aiSuggestForSlot(target.weekId, target.lIdx, target.sIdx);
}

async function aiSuggestForSlot(weekId, lIdx, sIdx, options) {
  options = options || {};
  const forceDirection = options.forceDirection || '';
  const userHint = options.userHint || '';

  const w = findWeek(weekId); if (!w) return;
  const slot = w.locations[lIdx].slots[sIdx];
  const locName = state.locations[lIdx];
  const dateRange = w.locations[lIdx].dateRange;

  // Контекст: что уже стоит на этой неделе на других локациях, какой маркер, какие темы уже в году у этого педагога
  const sameWeekThemes = [];
  w.locations.forEach((loc, i) => {
    if (i === lIdx) return;
    loc.slots.forEach(s => { if (s.theme) sameWeekThemes.push(s.theme + (s.teacher ? ` (${s.teacher})` : '')); });
  });
  const allThemes = [];
  state.weeks.forEach(ww => ww.locations.forEach(loc => loc.slots.forEach(s => {
    if (s.theme) allThemes.push(s.theme);
  })));

  const libList = LIBRARY.length
    ? '\nДОСТУПНЫЕ ТЕМЫ ИЗ БИБЛИОТЕКИ:\n' + LIBRARY.map(it => `- ${it.template || it.name} (${it.teacher || '?'}, ${it.direction || '?'})`).join('\n')
    : '';

  // Дополнительные инструкции от пользователя
  const userInstructions = [];
  if (forceDirection) {
    userInstructions.push(`ОБЯЗАТЕЛЬНО: направление — «${forceDirection}». Все предложенные темы должны соответствовать этому направлению.`);
  }
  if (userHint) {
    userInstructions.push(`ПОЖЕЛАНИЕ ПОЛЬЗОВАТЕЛЯ: ${userHint}`);
  }
  const userBlock = userInstructions.length ? '\n\n' + userInstructions.join('\n') + '\n' : '';

  const prompt = `Подбери 3-5 подходящих тем для слота интенсива.
Локация: ${locName}
Неделя: ${dateRange || '?'}
Маркер смены: ${w.marker || '—'}
Время: ${slot.time}
Возраст детей: ${state.ages || '6-11 лет'}

На той же неделе у других локаций уже стоят: ${sameWeekThemes.length ? sameWeekThemes.join('; ') : '—'}
В целом по году используются: ${allThemes.length ? allThemes.slice(0, 30).join(', ') + (allThemes.length>30?'...':''): '—'}
${libList}${userBlock}

Старайся не дублировать темы и педагогов одной недели. Если есть подходящая тема в библиотеке — используй её точное название.

Верни JSON-массив объектов:
[{"theme": "название темы", "teacher": "имя педагога", "direction": "${forceDirection || 'IT/Soft skills/Творчество/МНО/Смешанная'}", "rationale": "1-2 фразы почему подходит"}]`;

  // Лоадинг
  const oldHtml = document.getElementById('modal-content').innerHTML;
  if (document.getElementById('modal-overlay').classList.contains('show')) {
    openModal(`<h2>💡 ИИ подбирает тему…</h2><p><span class="loader"></span> Анализирую контекст недели…</p>`);
  } else {
    toast('💡 ИИ думает над темой…');
  }

  try {
    const text = await callClaude(prompt);
    let suggestions = [];
    try {
      const cleaned = text.trim().replace(/^```json\s*|\s*```$/g, '').replace(/^```\s*|\s*```$/g, '');
      suggestions = JSON.parse(cleaned);
    } catch(e) {
      throw new Error('Не удалось распарсить ответ ИИ: ' + text.slice(0, 200));
    }
    if (!Array.isArray(suggestions) || !suggestions.length) {
      throw new Error('ИИ не предложил вариантов');
    }

    const items = suggestions.map((s, idx) => `
      <div class="lib-suggestion" onclick="applyAiSuggestion('${weekId}',${lIdx},${sIdx},${idx})">
        <div class="name">${escapeHtml(s.theme || '—')}</div>
        <div class="meta"><b>педагог:</b> ${escapeHtml(s.teacher || '?')}</div>
        ${s.rationale ? `<div class="meta" style="margin-top:4px;font-style:italic">${escapeHtml(s.rationale)}</div>` : ''}
      </div>
    `).join('');
    window._aiSuggestions = suggestions;
    openModal(`
      <h2>💡 ИИ предлагает</h2>
      <p>${escapeHtml(state.locations[lIdx])} · ${escapeHtml(w.locations[lIdx].dateRange || '—')} · ${escapeHtml(slot.time)}</p>
      ${items}
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="aiSuggestForSlot('${weekId}',${lIdx},${sIdx})">↻ ещё варианты</button>
        <span style="flex:1"></span>
        <button class="btn btn-primary" onclick="closeModal()">закрыть</button>
      </div>
    `);
  } catch(e) {
    toast('ИИ ошибся: ' + e.message, 'error');
    console.error(e);
    if (oldHtml && document.getElementById('modal-overlay').classList.contains('show')) {
      document.getElementById('modal-content').innerHTML = oldHtml;
    } else {
      closeModal();
    }
  }
}

function applyAiSuggestion(weekId, lIdx, sIdx, idx) {
  const sug = (window._aiSuggestions || [])[idx];
  if (!sug) return;
  pushUndo();
  const w = findWeek(weekId); if (!w) return;
  const slot = w.locations[lIdx].slots[sIdx];
  slot.theme = sug.theme || slot.theme;
  slot.teacher = sug.teacher || slot.teacher;
  if (sug.direction) slot.direction = sug.direction;
  if (!slot.cost && state.defaultCost) slot.cost = String(state.defaultCost);
  saveLocal();
  closeModal();
  render();
  toast('Тема подставлена', 'success');
}

async function aiFillEmpty() {
  const empty = [];
  state.weeks.forEach(w => w.locations.forEach((loc, lIdx) => loc.slots.forEach((s, sIdx) => {
    if (!s.theme && !s.teacher) empty.push({ weekId: w.id, lIdx, sIdx });
  })));
  if (!empty.length) {
    toast('Пустых слотов нет', 'success');
    return;
  }
  if (!confirm(`ИИ заполнит ${empty.length} пустых слотов. Это может занять минуту. Продолжить?`)) return;

  // Готовим компактный контекст по всему расписанию
  const schedSummary = state.weeks.map(w => {
    const lines = [];
    w.locations.forEach((loc, lIdx) => {
      loc.slots.forEach((s, sIdx) => {
        if (s.theme || s.teacher) {
          lines.push(`${state.locations[lIdx]} ${loc.dateRange || '?'} ${s.time}: ${s.theme || '?'} (${s.teacher || '?'})`);
        }
      });
    });
    return `[${w.marker || '—'}] ${lines.join(' | ') || '—'}`;
  }).join('\n');

  const emptyDescr = empty.map((e, i) => {
    const w = findWeek(e.weekId);
    const loc = w.locations[e.lIdx];
    const slot = loc.slots[e.sIdx];
    return `#${i}: ${state.locations[e.lIdx]} · ${loc.dateRange || '?'} · ${slot.time} · маркер «${w.marker || '—'}»`;
  }).join('\n');

  const libList = LIBRARY.length
    ? '\nДОСТУПНЫЕ ТЕМЫ:\n' + LIBRARY.map(it => `- ${it.template || it.name} (${it.teacher || '?'})`).join('\n')
    : '';

  openModal(`<h2><span class="loader"></span> ИИ заполняет ${empty.length} слотов…</h2><p>Это занимает 30-60 сек. Не закрывайте вкладку.</p>`);

  const prompt = `Текущее расписание (только заполненные слоты):
${schedSummary}

Нужно заполнить пустые слоты:
${emptyDescr}
${libList}

Правила:
- не дублируй педагога на одной неделе
- старайся, чтобы темы соответствовали маркеру недели (если маркер «IT» — IT-темы; «Творческая» — творческие; «МНО» — научные/мир открытий; «Смешанная» — любые)
- если в библиотеке есть подходящая тема — используй её точное название

Верни JSON-массив длиной ${empty.length}, в том же порядке, что слоты выше:
[{"theme": "...", "teacher": "...", "cost": "${state.defaultCost || ''}"}]`;

  try {
    const text = await callClaude(prompt);
    const cleaned = text.trim().replace(/^```json\s*|\s*```$/g, '').replace(/^```\s*|\s*```$/g, '');
    const arr = JSON.parse(cleaned);
    if (!Array.isArray(arr)) throw new Error('Не массив');
    pushUndo();
    let filled = 0;
    arr.forEach((sug, i) => {
      if (i >= empty.length) return;
      const e = empty[i];
      const w = findWeek(e.weekId); if (!w) return;
      const slot = w.locations[e.lIdx].slots[e.sIdx];
      if (!slot) return;
      if (sug.theme) slot.theme = sug.theme;
      if (sug.teacher) slot.teacher = sug.teacher;
      if (sug.cost) slot.cost = String(sug.cost);
      else if (state.defaultCost) slot.cost = String(state.defaultCost);
      filled++;
    });
    saveLocal();
    closeModal();
    render();
    toast(`Заполнено ${filled} слотов`, 'success');
  } catch(e) {
    closeModal();
    toast('ИИ ошибся: ' + e.message, 'error');
    console.error(e);
  }
}

async function publishNow() {
  if (!state.publishId) {
    state.publishId = 'i_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
  }
  const id = state.publishId;
  const name = state.title || 'Интенсивы (без названия)';
  const stateJson = JSON.stringify(state);
  closeModal();
  openModal(`<h2><span class="loader"></span> Публикую…</h2>`);
  try {
    await fetch(LIBRARY_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'publish',
        project: PROJECT_TYPE,
        id, name, stateJson
      })
    });
    // Verify через GET
    let verified = false;
    for (let attempt = 1; attempt <= 4; attempt++) {
      await new Promise(r => setTimeout(r, 1500));
      try {
        const r = await fetch(LIBRARY_URL + '?action=getPublished&project=' + PROJECT_TYPE + '&id=' + encodeURIComponent(id) + '&_t=' + Date.now());
        const data = await r.json();
        if (data.ok && data.version) { verified = true; break; }
      } catch(e) {}
    }
    saveLocal();
    closeModal();
    if (verified) {
      const baseUrl = `${location.origin}${location.pathname.replace('index.html','')}`;
      const url = `${baseUrl}view.html?id=${encodeURIComponent(id)}`;
      const promoUrl = `${baseUrl}promo.html?id=${encodeURIComponent(id)}`;
      toast('✓ Опубликовано', 'success');
      openModal(`
        <h2>✓ Опубликовано</h2>
        <label>Ссылка для родителей</label>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <input type="text" value="${escapeHtml(url)}" readonly>
          <button class="btn btn-sm" onclick="copyToClip('${escapeJs(url)}')">📋</button>
          <a class="btn btn-sm" href="${url}" target="_blank">↗</a>
        </div>
        <label>Ссылка для маркетинга (с резервом)</label>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <input type="text" value="${escapeHtml(promoUrl)}" readonly>
          <button class="btn btn-sm" onclick="copyToClip('${escapeJs(promoUrl)}')">📋</button>
          <a class="btn btn-sm" href="${promoUrl}" target="_blank">↗</a>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" onclick="closeModal()">ок</button>
        </div>
      `);
    } else {
      toast('⚠ Опубликовано, но не удалось проверить — обновите страницу', 'error');
    }
  } catch(e) {
    closeModal();
    toast('Ошибка публикации: ' + e.message, 'error');
  }
  updatePubIndicator();
}

async function loadPublishedAndApply(id) {
  if (!confirm('Загрузить эту публикацию в админку (текущее состояние заменится)? Текущее можно вернуть через ↶ отменить.')) return;
  try {
    const r = await fetch(LIBRARY_URL + '?action=getPublished&project=' + PROJECT_TYPE + '&id=' + encodeURIComponent(id) + '&_t=' + Date.now());
    const data = await r.json();
    if (!data.ok || !data.version) throw new Error(data.error || 'не найдено');
    pushUndo();
    state = JSON.parse(data.version.stateJson);
    saveLocal();
    closeModal();
    render();
    toast('Публикация загружена', 'success');
  } catch(e) {
    toast('Ошибка: ' + e.message, 'error');
  }
}

async function deletePublishedVersion(id) {

}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.title || 'intensive') + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Экспортировано', 'success');
}

function importJSONClick() {
  document.getElementById('import-file').click();
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const obj = JSON.parse(e.target.result);
      if (!obj || !obj.weeks) throw new Error('Не похоже на сетку интенсивов');
      if (!confirm('Импортировать? Текущее состояние заменится.')) return;
      pushUndo();
      state = obj;
      saveLocal();
      render();
      toast('Импортировано', 'success');
    } catch(err) {
      toast('Ошибка импорта: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function tryLogin() {
  const pw = document.getElementById('auth-pw').value;
  const errEl = document.getElementById('auth-err');
  if (pw === ADMIN_PASSWORD) {
    try { localStorage.setItem(AUTH_LS_KEY, ADMIN_PASSWORD); } catch(e) {}
    location.reload();
  } else {
    errEl.textContent = 'Неверный пароль';
    document.getElementById('auth-pw').value = '';
    document.getElementById('auth-pw').focus();
  }
}

function logout() {

  try { localStorage.removeItem(AUTH_LS_KEY); } catch(e) {}

async function init() {
  if (_initialized) return;
  // Проверка пароля — если не авторизован, показываем экран входа и выходим
  if (!checkAuth()) {
    showLoginScreen();
    return;
  }
  _initialized = true;

  // Восстанавливаем имя редактора
  try { _editorName = localStorage.getItem('intensive_editor_name') || ''; } catch(e) {}
  // Восстанавливаем выбранную мобильную локацию
  try {
    const saved = parseInt(localStorage.getItem('intensive_mobile_loc'));
    if (!isNaN(saved) && saved >= 0 && saved < 3) _mobileLocIdx = saved;
  } catch(e) {}
  _sessionId = 's_' + Math.random().toString(36).slice(2, 10);

  // Поднимаем state из localStorage или дефолт
  const cached = loadLocal();
  if (cached && cached.weeks) {
    state = cached;
    // sanity defaults
    if (!state.locations) state.locations = ['Локация 1', 'Локация 2', 'Локация 3'];
    if (state.locations.length < 3) {
      while (state.locations.length < 3) state.locations.push('Локация ' + (state.locations.length+1));
    }
    if (!state.locationAddresses) state.locationAddresses = ['', '', ''];
    while (state.locationAddresses.length < 3) state.locationAddresses.push('');
    if (!state.locationDetails) state.locationDetails = [];
    while (state.locationDetails.length < 3) {
      state.locationDetails.push({ phone1: '', phone2: '', viber1: '', viber2: '', groupSize: '' });
    }
    if (state.bringWithYou === undefined) state.bringWithYou = '';
    state.weeks.forEach(w => {
      if (!w.id) w.id = 'w_' + Math.random().toString(36).slice(2, 9);
      if (!w.locations) w.locations = [makeLocationData(), makeLocationData(), makeLocationData()];
      while (w.locations.length < 3) w.locations.push(makeLocationData());
      w.locations.forEach(loc => {
        if (!loc.slots) loc.slots = [];
        // Миграция: слоты без status — старые, считаем утверждёнными если есть тема, иначе черновик
        loc.slots.forEach(s => {
          if (!s.status) {
            s.status = (s.theme || s.teacher) ? 'approved' : 'draft';
          }
        });
        autoSortSlots(loc);
      });
    });
  } else {
    state = makeDefaultState();
  }

  render();

  // Грузим библиотеку (не блокируем UI)
  loadLibrary();

  // Heartbeat при наличии publishId
  if (state.publishId) {
    startHeartbeat();
  }
}

const ALFA_BRANCH_ID = 5;  // филиал «Интенсивы»
let _crmReferenceCache = null;  // справочники кешируем после первой загрузки

// Получить справочники Альфы (педагоги, предметы, локации, аудитории и т.д.)
async function loadCrmReference(force) {
  if (_crmReferenceCache && !force) return _crmReferenceCache;
  const r = await fetch(LIBRARY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'crmReference', branchId: ALFA_BRANCH_ID })
  });
  const data = await r.json();
  if (!data.ok) throw new Error(data.error || 'не удалось получить справочники');
  _crmReferenceCache = data.reference || {};
  return _crmReferenceCache;
}

// Главная точка входа: открыть форму отправки слота в Альфу
async function openCrmDispatchForm(weekId, lIdx, sIdx) {
  const w = findWeek(weekId); if (!w) return;
  const slot = w.locations[lIdx].slots[sIdx];

  if (!slot.theme) { toast('Сначала укажите тему слота', 'error'); return; }
  if (!slot.time) { toast('Укажите время слота', 'error'); return; }
  if (!w.locations[lIdx].dateRange) { toast('Укажите даты недели', 'error'); return; }

  // Парсим даты заранее, чтобы валидировать
  const dates = parseSlotDateRange(w.locations[lIdx].dateRange, state.title);
  if (!dates || dates.length === 0) {
    toast('Не получилось распарсить даты «' + w.locations[lIdx].dateRange + '». Должно быть формата «1 - 5 июня»', 'error');
    return;
  }

  // Загружаем справочники
  openModal(`<h2><span class="loader"></span> Загружаю справочники Альфа CRM…</h2>`);
  let ref;
  try {
    ref = await loadCrmReference();
  } catch(e) {
    closeModal();
    toast('Ошибка: ' + e.message, 'error');
    return;
  }

  // Если уже отправляли — пробуем найти эту группу. Иначе ищем по имени.
  let existingGroup = null;
  let existingMode = null;  // 'this' (этот слот уже привязан) | 'name-collision' (другая группа с таким именем)
  if (slot.crmGroupId) {
    const found = (await crmFetchFindGroup(slot.theme)).groups || [];
    existingGroup = found.find(g => String(g.id) === String(slot.crmGroupId)) || found[0] || null;
    existingMode = existingGroup ? 'this' : null;
  } else {
    const found = (await crmFetchFindGroup(slot.theme)).groups || [];
    if (found.length > 0) {
      existingGroup = found[0];
      existingMode = 'name-collision';
    }
  }

  if (existingMode === 'this') {
    // Уже отправляли этот слот — спрашиваем что делать
    openModal(`
      <h2>Этот слот уже в Альфа CRM</h2>

async function crmFetchFindGroup(name) {
  try {
    const r = await fetch(LIBRARY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'crmFindGroup', branchId: ALFA_BRANCH_ID, name: name })
    });
    return await r.json();
  } catch(e) {
    return { ok: false, groups: [], error: String(e.message || e) };
  }
}

function proceedCrmForm(weekId, lIdx, sIdx, mode, existingGroupId) {
  const w = findWeek(weekId); if (!w) return;
  const slot = w.locations[lIdx].slots[sIdx];
  const ref = _crmReferenceCache;

  const dates = parseSlotDateRange(w.locations[lIdx].dateRange, state.title);
  const time = parseTimeForCrm(slot.time);

  // Помощник для опций
  const opts = (arr, selected, labelKey) => {
    labelKey = labelKey || 'name';
    return '<option value="">— выберите —</option>' + (arr || []).map(it =>
      `<option value="${escapeHtml(String(it.id))}" ${String(it.id)===String(selected)?'selected':''}>${escapeHtml(it[labelKey] || ('id ' + it.id))}</option>`
    ).join('');
  };

  // Угадываем педагога по имени из слота
  const teacherGuess = guessTeacherId(slot.teacher, ref.teachers || []);

  // Если филиал пустой — предупреждаем и не открываем форму
